<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Chord Atlas</title>
  <style>
    :root{
      --panel:rgba(18,27,41,.84);
      --panel-strong:rgba(14,21,33,.96);
      --line:rgba(255,255,255,.09);
      --line-strong:rgba(255,255,255,.15);
      --text:#ecf3ff;
      --muted:#aab9d0;
      --muted2:#8c9eb8;
      --accent:#67d4ff;
      --accent3:#4ef1c0;
      --warning:#ffbd66;
      --danger:#ff8ea1;
      --shadow:0 16px 42px rgba(0,0,0,.30);
      --shadow-soft:0 10px 24px rgba(0,0,0,.20);
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;height:100%}
    body{
      min-height:100vh;
      color:var(--text);
      font-family:Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(124,140,255,.18), transparent 28%),
        radial-gradient(circle at top right, rgba(103,212,255,.14), transparent 24%),
        linear-gradient(180deg, #091018 0%, #0b1017 32%, #0d1320 100%);
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
      overflow:hidden;
    }

    /* ✅ 上部説明文を完全非表示 */
    #currentChordMeta{
      display:none !important;
    }

    .noise{
      position:fixed;
      inset:0;
      pointer-events:none;
      opacity:.05;
      background-image:radial-gradient(rgba(255,255,255,.5) .5px, transparent .7px);
      background-size:10px 10px;
      mix-blend-mode:soft-light
    }

    .app{
      position:relative;
      height:100dvh;
      width:100%;
      padding:8px;
      min-height:0
    }

    .main-panel{
      position:relative;
      height:100%;
      min-height:0;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:20px;
      box-shadow:var(--shadow);
      overflow:hidden;
      display:flex;
      flex-direction:column;
      min-width:0
    }

    /* ✅ 上部バーを1行寄りに圧縮 */
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:10px 12px;
      border-bottom:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
      flex:0 0 auto;
      flex-wrap:nowrap;
      min-width:0;
    }

    .title-wrap{
      min-width:0;
      flex:1 1 auto;
      display:flex;
      align-items:center;
    }

    .title{
      margin:0;
      font-size:clamp(20px,3vw,30px);
      line-height:1;
      letter-spacing:-.03em;
      font-weight:800;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .title .slash{color:var(--warning)}

    .subtitle{
      color:var(--muted);
      font-size:14px;
      margin-top:6px;
      line-height:1.5
    }

    .top-actions{
      display:flex;
      align-items:center;
      gap:8px;
      flex:0 0 auto;
      flex-wrap:nowrap;
      justify-content:flex-end;
      min-width:0;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:6px 9px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      color:var(--muted);
      font-size:11px;
      font-weight:800;
      white-space:nowrap
    }

    .badge strong{
      color:var(--text);
      font-size:12px
    }

    .toolbar-btn,.note-btn,.chip,.mini-chip,.action-btn,.sheet-close,.sort-select{
      appearance:none;
      -webkit-appearance:none;
      border:none;
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
      transition:transform .12s ease,border-color .12s ease,background .12s ease,color .12s ease,box-shadow .12s ease
    }
    .toolbar-btn:active,.note-btn:active,.chip:active,.mini-chip:active,.action-btn:active,.sheet-close:active{
      transform:scale(.98)
    }

    .toolbar-btn{
      min-height:36px;
      padding:6px 12px;
      border-radius:10px;
      font-size:13px;
      font-weight:800;
      white-space:nowrap;
    }

    .toolbar-primary{
      color:#051018;
      background:linear-gradient(135deg,var(--accent3),var(--accent));
      box-shadow:0 10px 18px rgba(78,241,192,.14)
    }
    .toolbar-secondary{
      color:var(--muted);
      border:1px solid var(--line);
      background:rgba(255,255,255,.03)
    }

    .sort-wrap{
      display:flex;
      align-items:center;
      gap:6px;
      padding:4px 8px;
      border-radius:10px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
      white-space:nowrap;
    }

    .sort-label{
      font-size:10px;
      font-weight:800;
      color:var(--muted);
      letter-spacing:.08em;
      text-transform:uppercase
    }

    .sort-select{
      min-height:26px;
      padding:4px 24px 4px 8px;
      border-radius:8px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.05);
      color:var(--text);
      font-size:11px;
      font-weight:700;
      outline:none
    }

    .result-body{
      padding:12px;
      flex:1 1 auto;
      min-height:0;
      width:100%;
      display:block;
      overflow-y:auto;
      overflow-x:hidden;
      -webkit-overflow-scrolling:touch;
      overscroll-behavior:contain
    }

    .group-title{
      margin:0 0 12px;
      color:var(--muted);
      font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      font-size:12px;
      font-weight:700;
      letter-spacing:.12em;
      text-transform:uppercase
    }

    .diagram-grid{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:14px;
      align-items:stretch;
      align-content:start;
      width:100%
    }

    .diagram-card{
      background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.018));
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
      box-shadow:var(--shadow-soft);
      display:flex;
      flex-direction:column;
      min-width:0;
      min-height:255px
    }

    .diagram-header{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      margin-bottom:8px
    }

    .diagram-title{
      font-size:14px;
      font-weight:800;
      color:var(--text);
      line-height:1.2
    }

    .diagram-sub{
      font-size:12px;
      color:var(--muted2);
      margin-top:4px;
      line-height:1.35
    }

    .fret-pill{
      flex:0 0 auto;
      padding:5px 8px;
      border-radius:999px;
      background:rgba(255,255,255,.04);
      border:1px solid var(--line);
      color:var(--muted);
      font-size:12px;
      font-weight:800;
      letter-spacing:.08em;
      text-transform:uppercase;
      font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace
    }

    .diagram-svg-wrap{
      width:100%;
      min-height:128px;
      display:flex;
      align-items:center;
      justify-content:center;
      margin-top:4px
    }

    .diagram-svg-wrap svg{
      display:block;
      width:100%;
      max-width:118px;
      height:auto;
      overflow:visible;
      flex:0 0 auto
    }

    .voicing-meta{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:auto;
      padding-top:8px
    }

    .meta-pill{
      padding:5px 8px;
      border-radius:999px;
      background:rgba(255,255,255,.035);
      border:1px solid var(--line);
      color:var(--muted);
      font-size:11px;
      font-weight:700;
      max-width:100%;
      overflow-wrap:anywhere
    }

    .meta-pill.warning{
      color:#fff;
      border-color:rgba(255,189,102,.38);
      background:linear-gradient(135deg, rgba(255,189,102,.16), rgba(124,140,255,.12))
    }

    .meta-pill.danger{
      color:#fff;
      border-color:rgba(255,142,161,.35);
      background:linear-gradient(135deg, rgba(255,142,161,.18), rgba(124,140,255,.12))
    }

    .empty{
      display:grid;
      place-items:center;
      min-height:260px;
      text-align:center;
      padding:20px
    }

    .empty .orb{
      width:46px;
      height:46px;
      border-radius:999px;
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,.35), transparent 30%),
        linear-gradient(135deg, rgba(103,212,255,.35), rgba(124,140,255,.28), rgba(78,241,192,.20));
      box-shadow:0 0 50px rgba(103,212,255,.18);
      margin:0 auto 12px
    }

    .empty h3{
      margin:0 0 8px;
      font-size:22px;
      letter-spacing:-.02em
    }

    .empty p{
      max-width:580px;
      margin:0 auto;
      color:var(--muted);
      line-height:1.6;
      font-size:14px
    }

    .overlay{
      position:fixed;
      inset:0;
      background:rgba(2,7,15,.58);
      opacity:0;
      pointer-events:none;
      transition:opacity .18s ease;
      z-index:20
    }

    .overlay.open{
      opacity:1;
      pointer-events:auto
    }

    .picker-sheet{
      position:fixed;
      left:50%;
      transform:translateX(-50%) translateY(110%);
      bottom:8px;
      width:min(92vw,440px);
      max-height:78dvh;
      background:var(--panel-strong);
      border:1px solid var(--line);
      border-radius:22px;
      box-shadow:0 24px 50px rgba(0,0,0,.38);
      overflow:hidden;
      display:flex;
      flex-direction:column;
      z-index:30;
      transition:transform .22s ease
    }

    .picker-sheet.open{
      transform:translateX(-50%) translateY(0)
    }

    .desktop-selector{
      display:block;
      position:fixed;
      top:8px;
      right:8px;
      bottom:8px;
      width:min(360px,31vw);
      background:var(--panel-strong);
      border:1px solid var(--line);
      border-radius:20px;
      box-shadow:var(--shadow);
      overflow:hidden;
      z-index:25
    }

    .desktop-selector .controls-scroll{
      height:calc(100% - 53px)
    }

    .desktop-selector .sheet-close{
      display:none
    }

    body.desktop-open .app{
      padding-right:min(376px, calc(31vw + 16px))
    }

    body.desktop-open .overlay{
      display:none
    }

    .sheet-head{
      padding:12px 14px 10px;
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      flex:0 0 auto;
      background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01))
    }

    .sheet-title{
      font-size:15px;
      font-weight:800;
      letter-spacing:.03em
    }

    .sheet-close{
      width:34px;
      height:34px;
      border-radius:999px;
      background:rgba(255,255,255,.04);
      border:1px solid var(--line);
      color:var(--muted);
      font-size:18px;
      line-height:1
    }

    .controls-scroll{
      padding:14px;
      overflow:auto;
      min-height:0;
      -webkit-overflow-scrolling:touch;
      overscroll-behavior:contain
    }

    .section{margin-bottom:14px}
    .section:last-child{margin-bottom:0}

    .section-label{
      display:flex;
      align-items:center;
      gap:8px;
      margin:0 0 10px;
      color:var(--muted);
      font-size:12px;
      font-weight:700;
      letter-spacing:.12em;
      text-transform:uppercase;
      font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace
    }

    .section-label::after{
      content:"";
      flex:1;
      height:1px;
      background:linear-gradient(90deg,var(--line-strong),transparent)
    }

    .note-grid,.slash-row{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:8px
    }

    .quality-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:8px
    }

    .note-btn{
      min-height:42px;
      border-radius:11px;
      border:1px solid var(--line);
      background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.02));
      color:var(--text);
      font-weight:700;
      font-size:15px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.05)
    }

    .note-btn.selected{
      background:linear-gradient(135deg,rgba(103,212,255,.25),rgba(124,140,255,.22));
      border-color:rgba(103,212,255,.55);
      box-shadow:0 0 0 1px rgba(103,212,255,.25) inset,0 8px 20px rgba(103,212,255,.12);
      color:#fff
    }

    .chip{
      min-height:42px;
      padding:8px 10px;
      border-radius:11px;
      border:1px solid var(--line);
      background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.02));
      color:var(--text);
      font-size:13px;
      font-weight:700;
      text-align:center;
      line-height:1.2
    }

    .chip.selected{
      border-color:rgba(78,241,192,.48);
      background:linear-gradient(135deg,rgba(78,241,192,.18),rgba(103,212,255,.12));
      box-shadow:0 8px 20px rgba(78,241,192,.08)
    }

    .mini-chip{
      min-height:38px;
      padding:6px 6px;
      border-radius:10px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
      color:var(--muted);
      font-size:12px;
      font-weight:800
    }

    .mini-chip.selected{
      background:linear-gradient(135deg,rgba(255,189,102,.18),rgba(124,140,255,.16));
      border-color:rgba(255,189,102,.45);
      color:#fff
    }

    .action-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:8px
    }

    .action-btn{
      min-height:34px;
      padding:6px 12px;
      border-radius:10px;
      font-size:12px;
      font-weight:800
    }

    .action-secondary{
      color:var(--muted);
      border:1px solid var(--line);
      background:rgba(255,255,255,.03)
    }

    .fab{
      position:fixed;
      right:14px;
      bottom:14px;
      z-index:15;
      display:none
    }

    /* PC時に5列寄り */
    @media (min-width: 1200px){
      .diagram-grid{grid-template-columns:repeat(auto-fill, minmax(245px, 1fr));gap:12px}
      .diagram-card{min-height:240px;padding:10px}
      .diagram-title{font-size:13px}
      .diagram-sub{font-size:11px}
      .fret-pill{font-size:11px;padding:4px 7px}
      .diagram-svg-wrap{min-height:118px}
      .diagram-svg-wrap svg{max-width:110px}
    }

    @media (min-width: 1600px){
      .diagram-grid{grid-template-columns:repeat(auto-fill, minmax(215px, 1fr));gap:10px}
      .diagram-card{min-height:225px;padding:9px}
      .diagram-svg-wrap{min-height:108px}
      .diagram-svg-wrap svg{max-width:100px}
      .meta-pill{font-size:10px;padding:4px 7px}
    }

    @media (max-width: 900px){
      .diagram-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
    }

    @media (max-width: 640px){
      .app{padding:8px}

      .topbar{
        align-items:center;
        gap:8px;
        padding:8px 10px;
      }

      .title-wrap{
        flex:1 1 auto;
        min-width:0;
      }

      .title{
        font-size:20px;
        white-space:nowrap;
        overflow:hidden;
        text-overflow:ellipsis;
      }

      .badge{
        font-size:10px;
        padding:5px 7px;
      }

      .sort-wrap{display:none}

      .top-actions{
        gap:6px;
        flex-wrap:nowrap;
      }

      .toolbar-btn{
        min-height:40px;
        padding:6px 12px;
        font-size:13px;
      }

      .toolbar-secondary.inline-reset{display:none}

      .result-body{padding:8px}

      .diagram-grid{
        grid-template-columns:repeat(2,minmax(0,1fr));
        gap:8px
      }

      .diagram-card{
        min-height:188px;
        padding:8px;
        border-radius:14px
      }

      .diagram-title{font-size:12px}
      .diagram-sub{font-size:11px}
      .fret-pill{font-size:11px;padding:4px 7px}
      .diagram-svg-wrap{min-height:102px}
      .diagram-svg-wrap svg{max-width:108px}
      .meta-pill{font-size:11px;padding:4px 6px}

      .picker-sheet{
        left:8px;
        right:8px;
        width:auto;
        max-height:72dvh;
        bottom:8px;
        transform:translateY(110%);
        border-radius:20px
      }

      .picker-sheet.open{transform:translateY(0)}

      .sheet-head{padding:10px 10px 8px}
      .controls-scroll{padding:10px}
      .section{margin-bottom:10px}
      .section-label{font-size:11px;margin-bottom:7px}
      .note-grid,.slash-row,.quality-grid{gap:6px}
      .note-btn{min-height:38px;font-size:14px}
      .chip{min-height:38px;font-size:12px;padding:7px 8px}
      .mini-chip{min-height:34px;font-size:11px;padding:5px 4px}
      .action-btn{min-height:32px;padding:4px 10px;font-size:12px}
      .fab{display:block}
      .desktop-selector{display:none !important}
    }
  </style>
</head>
<body>
  <div class="noise"></div>
  <div class="app">
    <section class="main-panel">
      <div class="topbar">
        <div class="title-wrap">
          <h1 class="title" id="currentChordLabel">Select a chord</h1>
          <div class="subtitle" id="currentChordMeta">Choose root, chord type, and optional bass note.</div>
        </div>
        <div class="top-actions">
          <div class="badge">Mode <strong id="modeLabel">Chord</strong></div>
          <div class="sort-wrap" title="Sort order">
            <span class="sort-label">Sort</span>
            <select id="sortSelect" class="sort-select">
              <option value="recommended">Recommended</option>
              <option value="lowfret">Low fret</option>
              <option value="open">Open first</option>
              <option value="bass">Bass priority</option>
            </select>
          </div>
          <button class="toolbar-btn toolbar-primary" id="openPickerBtn" type="button">Select</button>
          <button class="toolbar-btn toolbar-secondary inline-reset" id="resetBtnTop" type="button">Reset</button>
        </div>
      </div>
      <div class="result-body" id="resultBody">
        <div class="empty"><div><div class="orb"></div><h3>Ready</h3><p>Open the selector and choose a root and chord type. Slash bass can show special/non-chord bass candidates too.</p></div></div>
      </div>
    </section>
    <button class="toolbar-btn toolbar-primary fab" id="fabOpenBtn" type="button">Select</button>
    <div class="overlay" id="overlay"></div>
    <aside class="picker-sheet" id="pickerSheet" aria-hidden="true"></aside>
    <aside class="desktop-selector" id="desktopSelector" aria-hidden="false"></aside>
  </div>

  <script>
    const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
    const STRING_PC = [4,9,2,7,11,4]; // 6弦→1弦 : E A D G B e
    const MAX_FRET = 15;

    const QUALITIES = [
      {key:'maj',  suffix:'',     label:'Major', intervals:[0,4,7]},
      {key:'min',  suffix:'m',    label:'Minor', intervals:[0,3,7]},
      {key:'7',    suffix:'7',    label:'7',     intervals:[0,4,7,10]},
      {key:'m7',   suffix:'m7',   label:'m7',    intervals:[0,3,7,10]},
      {key:'maj7', suffix:'maj7', label:'maj7',  intervals:[0,4,7,11]},
      {key:'6',    suffix:'6',    label:'6',     intervals:[0,4,7,9]},
      {key:'m6',   suffix:'m6',   label:'m6',    intervals:[0,3,7,9]},
      {key:'dim',  suffix:'dim',  label:'dim',   intervals:[0,3,6]},
      {key:'dim7', suffix:'dim7', label:'dim7',  intervals:[0,3,6,9]},
      {key:'m7b5', suffix:'m7♭5', label:'m7♭5',  intervals:[0,3,6,10]},
      {key:'aug',  suffix:'aug',  label:'aug',   intervals:[0,4,8]},
      {key:'sus4', suffix:'sus4', label:'sus4',  intervals:[0,5,7]},
      {key:'sus2', suffix:'sus2', label:'sus2',  intervals:[0,2,7]},
    ];
    const QUALITY_BY_KEY = Object.fromEntries(QUALITIES.map(q => [q.key, q]));

    const EXPLICIT_FORMS = {
      'C_maj': [
        {label:'Open', frets:[null,3,2,0,1,0]},
        {label:'C shape / 12fr', frets:[8,10,10,9,8,8]},
        {label:'A shape / 3fr', frets:[null,3,5,5,5,3]}
      ],
      'D_maj': [
        {label:'Open', frets:[null,null,0,2,3,2]},
        {label:'A shape / 5fr', frets:[null,5,7,7,7,5]},
        {label:'E shape / 10fr', frets:[10,12,12,11,10,10]}
      ],
      'E_maj': [
        {label:'Open', frets:[0,2,2,1,0,0]},
        {label:'A shape / 7fr', frets:[null,7,9,9,9,7]},
        {label:'C shape / 4fr', frets:[null,7,6,4,5,4]}
      ],
      'G_maj': [
        {label:'Open', frets:[3,2,0,0,0,3]},
        {label:'E shape / 3fr', frets:[3,5,5,4,3,3]},
        {label:'D shape / 7fr', frets:[null,null,5,7,8,7]}
      ],
      'A_maj': [
        {label:'Open', frets:[null,0,2,2,2,0]},

    function shapeScore(shape, rootPC, qualityKey, bassPC=null){
      const distinctChordTones = countDistinctChordTones(shape, rootPC, qualityKey);

      const span = getSpanInfo(shape.frets).span;

      score += playedCount * 4;

      if(shape.origin === 'template') score += 8;
      if(shape.origin === 'compact') score += 4;
      if(shape.origin === 'advanced-search') score += 10;

        return a.frets.filter(v=>v===null).length - b.frets.filter(v=>v===null).length;
      });

    function compactWindowVoicings(rootPC, qualityKey, bassPC=null){
      const q = QUALITY_BY_KEY[qualityKey];
      const tones = new Set(q.intervals.map(iv => (rootPC + iv) % 12));
      const windows = [0,2,4,5,7,9,10];
      const stringSets = [[2,3,4,5],[1,2,3,4],[0,1,2,3]];
      const out=[]; const seen=new Set();

            let chosen=null;
            for(let f=start; f<=end; f++){
              const pc=getPitchClassOnString(s,f);
              if(tones.has(pc)){ chosen=f; break; }
            }
            if(chosen!==null){ frets[s]=chosen; got.add(getPitchClassOnString(s,chosen)); }

          if(got.size<3) continue;
          const shape={label:`Compact / ${start}fr`, frets, kind:'compact', origin:'compact', baseFret:start};

      return out;

            candidatesByString[s]=[null, ...base];
          }
          shapes.push(...enumerateCandidates(strings, candidatesByString, { rootPC, qualityKey, bassPC, label:`Advanced / ${start}fr`, origin:'advanced-search', maxResults:8, allowSpecialBass:false }));
        }
      }
      return dedupeShapes(shapes).slice(0,10);
    }

    function searchBassPrioritySlashVoicings(rootPC, qualityKey, bassPC){
      if(bassPC === null) return [];
      const chordTones=getChordToneSet(rootPC, qualityKey);
      const specialBass=!chordTones.has(bassPC);
      const shapes=[];
      const bassStrings=[0,1,2];
      for(const bassString of bassStrings){
        const bassFrets=getFretsForPCOnString(bassString, bassPC, 0, MAX_FRET).filter(f => f <= 12 || (bassString === 0 && f <= 15));
        for(const bassFret of bassFrets){
          const windowStart = bassFret===0 ? 0 : Math.max(0, bassFret-1);
          const windowEnd = Math.min(MAX_FRET, bassFret+4);
          const frets = new Array(6).fill(null);
          for(let s=0;s<bassString;s++) frets[s]=null;
          frets[bassString]=bassFret;
          const upperStrings=[]; for(let s=bassString+1;s<6;s++) upperStrings.push(s);
          const candidatesByString={};
          for(const s of upperStrings){
            let cand=[];
            for(let f=windowStart; f<=windowEnd; f++){
              const pc=getPitchClassOnString(s,f);
              if(chordTones.has(pc)) cand.push(f);
            }
            if(!cand.includes(0) && chordTones.has(getPitchClassOnString(s,0))) cand=[0, ...cand];
            const uniq=[...new Set(cand)].sort((a,b)=>{ if(a===0&&b!==0) return -1; if(b===0&&a!==0) return 1; return a-b; });
            candidatesByString[s]=[null, ...uniq.slice(0,4)];
          }
          const local=[];
          function dfs(idx){
            if(local.length >= 18) return;
            if(idx >= upperStrings.length){
              const shape={
                label: specialBass ? `Special bass priority / ${bassFret}fr` : `Bass priority / ${bassFret}fr`,
                frets:[...frets],
                kind:specialBass ? 'special-bass-priority' : 'bass-priority',
                origin:specialBass ? 'special-bass-priority' : 'bass-priority',
                specialBass
              };
              if(!validateShape(shape, rootPC, qualityKey, bassPC, true)) return;
              const distinctChordTones=countDistinctChordTones(shape, rootPC, qualityKey); if(distinctChordTones < 3) return;
              if(getLowestSoundingString(shape) !== bassString) return;
              let outsideCount=0;
              shape.frets.forEach((f,s)=>{ if(f===null) return; const pc=getPitchClassOnString(s,f); const allowedSpecial=s===bassString && pc===bassPC && !chordTones.has(pc); if(!chordTones.has(pc) && !allowedSpecial) outsideCount++; });
              if(outsideCount>0) return;
              local.push(shape); return;
            }
            const s=upperStrings[idx];
            for(const f of candidatesByString[s]){
              frets[s]=f;
              const {span}=getSpanInfo(frets); if(span>5){ frets[s]=null; continue; }
              dfs(idx+1);
              frets[s]=null;
            }
          }
          dfs(0);
          shapes.push(...local);
        }
      }
      return dedupeShapes(shapes).slice(0,12);
    }

    let selectedRoot = null;
    let selectedQuality = null;
    let selectedBass = null;
    let selectedSort = 'recommended';

    function getShapesFor(rootPC, qualityKey, bassPC=null){
      const forms=[];
      forms.push(...getFormsFromExplicit(rootPC, qualityKey));
      forms.push(...getFormsFromSlashDictionary(rootPC, qualityKey, bassPC));
      forms.push(...getFormsFromSlashTemplates(rootPC, qualityKey, bassPC));
      forms.push(...getTemplateForms(rootPC, qualityKey));
      forms.push(...compactWindowVoicings(rootPC, qualityKey, bassPC));
      forms.push(...advancedWindowVoicings(rootPC, qualityKey, bassPC));
      if(bassPC !== null) forms.push(...searchBassPrioritySlashVoicings(rootPC, qualityKey, bassPC));
      const postFiltered=[];
      for(const form of forms){
        const low=getLowestSoundingPC(form);
        if(bassPC !== null && low !== bassPC) continue;
        if(!isPlayableShape(form)) continue;
        postFiltered.push(form);
      }
      return sortShapes(dedupeShapes(postFiltered), rootPC, qualityKey, bassPC, selectedSort).slice(0, 24);
    }

    function renderDiagramSVG(shape){
      const W=156, H=196;
      const left=24, right=W-18, top=36, bottom=H-18;
      const nStrings=6, nFrets=5;
      const stepX=(right-left)/(nStrings-1);
      const stepY=(bottom-top)/nFrets;
      const positiveFrets=shape.frets.filter(v => v !== null && v > 0);
      const minF=positiveFrets.length ? Math.min(...positiveFrets) : 0;
      const baseFret=minF > 1 ? minF : 0;
      const showNut=baseFret===0;
      const gradId1='boardGrad_'+Math.random().toString(36).slice(2,10);
      const gradId2='markGrad_'+Math.random().toString(36).slice(2,10);
      const gradId3='specialGrad_'+Math.random().toString(36).slice(2,10);
      let svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">`;
      svg += `<defs><linearGradient id="${gradId1}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#131d2d"/><stop offset="100%" stop-color="#0b1017"/></linearGradient><linearGradient id="${gradId2}" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#7cf5ff"/><stop offset="100%" stop-color="#4ef1c0"/></linearGradient><linearGradient id="${gradId3}" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ffbd66"/><stop offset="100%" stop-color="#ff8ea1"/></linearGradient></defs>`;
      svg += `<rect x="${left-8}" y="${top-4}" width="${right-left+16}" height="${bottom-top+8}" rx="10" fill="url(#${gradId1})" stroke="rgba(255,255,255,0.08)"/>`;
      for(let i=0;i<=nFrets;i++){
        const y=top+stepY*i;
        const strokeW=(i===0 && showNut)?4.5:1.25;
        svg += `<line x1="${left}" y1="${y}" x2="${right}" y2="${y}" stroke="rgba(236,243,255,0.92)" stroke-width="${strokeW}" opacity="${i===0?1:.88}"/>`;
      }
      for(let s=0;s<nStrings;s++){
        const x=left+stepX*s;
        svg += `<line x1="${x}" y1="${top}" x2="${x}" y2="${bottom}" stroke="rgba(236,243,255,0.85)" stroke-width="1.15"/>`;
      }
      if(!showNut){
        svg += `<text x="${left-10}" y="${top + stepY*0.78}" fill="#c6d5ea" font-family="Inter, sans-serif" font-weight="800" font-size="13" text-anchor="end">${baseFret}fr</text>`;
      }
      const lowestString=getLowestSoundingString(shape);
      shape.frets.forEach((f,s)=>{
        const x=left+stepX*s;
        if(f===null){
          svg += `<text x="${x}" y="${top-11}" fill="#ff9aad" font-family="Inter, sans-serif" font-size="13" font-weight="800" text-anchor="middle">×</text>`;
          return;
        }
        if(showNut && f===0){
          const fill=(shape.specialBass && s===lowestString)?`url(#${gradId3})`:'none';
          const stroke=(shape.specialBass && s===lowestString)?'#ffbd66':'rgba(236,243,255,0.95)';
          if(fill==='none') svg += `<circle cx="${x}" cy="${top-9}" r="4.6" fill="none" stroke="${stroke}" stroke-width="1.8"/>`;
          else svg += `<circle cx="${x}" cy="${top-9}" r="5.2" fill="${fill}" stroke="${stroke}" stroke-width="1.6"/>`;
          return;
        }
        const row=showNut ? f : (f - baseFret + 1);
        if(row < 1 || row > nFrets) return;
        const cy=top+stepY*(row-0.5);
        const special=shape.specialBass && s===lowestString;
        svg += `<circle cx="${x}" cy="${cy}" r="${special ? 7.2 : 6.2}" fill="${special ? `url(#${gradId3})` : `url(#${gradId2})`}" stroke="rgba(255,255,255,0.16)" stroke-width="1.1"/>`;
      });
      svg += `</svg>`;
      return svg;
    }

    function parseShapeInfo(shape, rootPC, qualityKey, bassPC){
      const pcs=[...new Set(getPitchClassesInShape(shape))].map(pc => NOTE_NAMES[pc]).join(' / ');
      const bassName=bassPC !== null ? NOTE_NAMES[bassPC] : NOTE_NAMES[getLowestSoundingPC(shape)];
      const special=bassPC !== null && !isChordTone(rootPC, qualityKey, bassPC);
      return {tones:pcs, bass:bassName, special};
    }

    function sourceLabel(shape){
      switch(shape.origin){
        case 'explicit': return 'Dictionary';
        case 'slash-explicit': return 'Slash dict';
        case 'slash-template': return 'Slash template';
        case 'template': return 'Movable';
        case 'compact': return 'Compact';
        case 'advanced-search': return 'Auto search';
        case 'bass-priority': return 'Bass priority';
        case 'special-bass-priority': return 'Special bass';
        default: return 'Generated';
      }
    }

    const resultBody = document.getElementById('resultBody');
    const currentChordLabel = document.getElementById('currentChordLabel');
    const currentChordMeta = document.getElementById('currentChordMeta');
    const modeLabel = document.getElementById('modeLabel');
    const overlay = document.getElementById('overlay');
    const pickerSheet = document.getElementById('pickerSheet');
    const desktopSelector = document.getElementById('desktopSelector');
    const openPickerBtn = document.getElementById('openPickerBtn');
    const fabOpenBtn = document.getElementById('fabOpenBtn');
    const resetBtnTop = document.getElementById('resetBtnTop');
    const sortSelect = document.getElementById('sortSelect');

    function selectorMarkup(prefix, includeClose){
      return `
        <div class="sheet-head">
          <div class="sheet-title">Chord Selector</div>
          ${includeClose ? '<button class="sheet-close" id="closePickerBtnInner" type="button" aria-label="Close">×</button>' : ''}
        </div>
        <div class="controls-scroll" id="controlsScroll${prefix}">
          <section class="section">
            <p class="section-label">Root</p>
            <div class="note-grid" id="rootGrid${prefix}"></div>
          </section>
          <section class="section">
            <p class="section-label">Chord Type</p>
            <div class="quality-grid" id="qualityGrid${prefix}"></div>
          </section>
          <section class="section">
            <p class="section-label">Bass</p>
            <div class="slash-row" id="bassGrid${prefix}"></div>
          </section>
          <div class="action-row">
            <button class="action-btn action-secondary" id="resetBtn${prefix}" type="button">Reset</button>
          </div>
        </div>`;
    }

    pickerSheet.innerHTML = selectorMarkup('', true);
    desktopSelector.innerHTML = selectorMarkup('Desktop', false);

    const rootGrids = [document.getElementById('rootGrid'), document.getElementById('rootGridDesktop')];
    const qualityGrids = [document.getElementById('qualityGrid'), document.getElementById('qualityGridDesktop')];
    const bassGrids = [document.getElementById('bassGrid'), document.getElementById('bassGridDesktop')];
    document.getElementById('closePickerBtnInner').addEventListener('click', closePicker);
    document.getElementById('resetBtn').addEventListener('click', resetAll);
    document.getElementById('resetBtnDesktop').addEventListener('click', resetAll);

    function isMobile(){ return window.matchMedia('(max-width: 640px)').matches; }
    function openPicker(){ overlay.classList.add('open'); pickerSheet.classList.add('open'); pickerSheet.setAttribute('aria-hidden','false'); }
    function closePicker(){ overlay.classList.remove('open'); pickerSheet.classList.remove('open'); pickerSheet.setAttribute('aria-hidden','true'); }

    function renderResults(){
      /* ✅ 念のため常に空にする */
      currentChordMeta.textContent = '';

      if(selectedRoot === null || selectedQuality === null){
        currentChordLabel.textContent = 'Select a chord';
        currentChordMeta.textContent = '';
        modeLabel.textContent = 'Chord';
        resultBody.innerHTML = `<div class="empty"><div><div class="orb"></div><h3>Ready</h3><p>Open the selector and choose a root and chord type. Slash bass can also show special/non-chord bass candidates.</p></div></div>`;
        return;
      }

      const q = QUALITY_BY_KEY[selectedQuality];
      const main = `${NOTE_NAMES[selectedRoot]}${q.suffix}`;
      const specialBassMode = selectedBass !== null && !isChordTone(selectedRoot, selectedQuality, selectedBass);
      currentChordLabel.innerHTML = selectedBass === null ? main : `${main}<span class="slash"> / ${NOTE_NAMES[selectedBass]}</span>`;

      if(selectedBass === null){
        currentChordMeta.textContent = '';
        modeLabel.textContent = 'Chord';
      }else if(specialBassMode){
        currentChordMeta.textContent = '';
        modeLabel.textContent = 'Special';
      }else{
        currentChordMeta.textContent = '';
        modeLabel.textContent = 'Slash';
      }

      const shapes = getShapesFor(selectedRoot, selectedQuality, selectedBass);
      if(!shapes.length){
        resultBody.innerHTML = `<div class="empty"><div><div class="orb"></div><h3>No result</h3><p>Try another bass note, root, or chord type. Some special bass combinations may still have no practical shape within the fret/span limits.</p></div></div>`;
        return;
      }

      resultBody.innerHTML = `<h3 class="group-title">Voicings</h3><div class="diagram-grid">${shapes.map(shape => {
        const info = parseShapeInfo(shape, selectedRoot, selectedQuality, selectedBass);
        const pos = getMinPlayedFret(shape.frets);
        const fretText = pos > 1 ? `${pos}fr` : 'Open';
        return `<article class="diagram-card"><div class="diagram-header"><div><div class="diagram-title">${shape.label}</div><div class="diagram-sub">Bass: ${info.bass}${info.special ? ' · Special bass' : ''}</div></div><div class="fret-pill">${fretText}</div></div><div class="diagram-svg-wrap">${renderDiagramSVG(shape)}</div><div class="voicing-meta"><span class="meta-pill">${info.tones}</span><span class="meta-pill">${sourceLabel(shape)}</span>${info.special ? '<span class="meta-pill danger">Special bass</span>' : ''}${shape.origin === 'bass-priority' ? '<span class="meta-pill warning">Low bass priority</span>' : ''}${shape.origin === 'special-bass-priority' ? '<span class="meta-pill warning">Special + low bass</span>' : ''}</div></article>`;
      }).join('')}</div>`;
    }

    function setRoot(pc){
      selectedRoot = pc;
      rootGrids.forEach(grid => [...grid.children].forEach((c,i)=>{
        const on=i===pc;
        c.classList.toggle('selected', on);
        c.setAttribute('aria-pressed', on ? 'true' : 'false');
      }));
      renderResults();
    }

    function setQuality(key){
      selectedQuality = key;
      qualityGrids.forEach(grid => [...grid.children].forEach((c,i)=>{
        const on=QUALITIES[i].key===key;
        c.classList.toggle('selected', on);
        c.setAttribute('aria-pressed', on ? 'true' : 'false');
      }));
      renderResults();
    }

    function setBass(pcOrNull){
      selectedBass = pcOrNull;
      bassGrids.forEach(grid => [...grid.children].forEach(btn=>{
        const val = btn.dataset.bass;
        const on = (pcOrNull===null && val==='none') || (pcOrNull!==null && val===String(pcOrNull));
        btn.classList.toggle('selected', on);
      }));
      renderResults();
    }

    function createButtons(){
      NOTE_NAMES.forEach((n,pc)=>{
        rootGrids.forEach(target=>{
          const btn=document.createElement('button');
          btn.className='note-btn';
          btn.textContent=n;
          btn.type='button';
          btn.setAttribute('aria-pressed','false');
          btn.addEventListener('click', ()=>setRoot(pc));
          target.appendChild(btn);
        });
      });

      QUALITIES.forEach(q=>{
        qualityGrids.forEach(target=>{
          const btn=document.createElement('button');
          btn.className='chip';
          btn.textContent=q.label;
          btn.type='button';
          btn.setAttribute('aria-pressed','false');
          btn.addEventListener('click', ()=>setQuality(q.key));
          target.appendChild(btn);
        });
      });

      bassGrids.forEach(target=>{
        const noneBtn=document.createElement('button');
        noneBtn.className='mini-chip selected';
        noneBtn.textContent='None';
        noneBtn.dataset.bass='none';
        noneBtn.type='button';
        noneBtn.addEventListener('click', ()=>setBass(null));
        target.appendChild(noneBtn);

        NOTE_NAMES.forEach((n,pc)=>{
          const btn=document.createElement('button');
          btn.className='mini-chip';
          btn.textContent=n;
          btn.dataset.bass=String(pc);
          btn.type='button';
          btn.addEventListener('click', ()=>setBass(pc));
          target.appendChild(btn);
        });
      });
    }

    function resetAll(){
      selectedRoot=null;
      selectedQuality=null;
      selectedBass=null;
      rootGrids.forEach(grid=>[...grid.children].forEach(c=>{
        c.classList.remove('selected');
        c.setAttribute('aria-pressed','false');
      }));
      qualityGrids.forEach(grid=>[...grid.children].forEach(c=>{
        c.classList.remove('selected');
        c.setAttribute('aria-pressed','false');
      }));
      bassGrids.forEach(grid=>[...grid.children].forEach(btn=>btn.classList.toggle('selected', btn.dataset.bass==='none')));
      renderResults();
      resultBody.scrollTop = 0;
      document.getElementById('controlsScroll').scrollTop = 0;
      document.getElementById('controlsScrollDesktop').scrollTop = 0;
    }

    openPickerBtn.addEventListener('click', openPicker);
    fabOpenBtn.addEventListener('click', openPicker);
    overlay.addEventListener('click', closePicker);
    resetBtnTop.addEventListener('click', resetAll);
    sortSelect.addEventListener('change', e => { selectedSort = e.target.value; renderResults(); });
    document.addEventListener('keydown', e=>{ if(e.key === 'Escape') closePicker(); });

    function syncUiVisibility(){
      if(!isMobile()){
        fabOpenBtn.style.display = 'none';
        document.body.classList.add('desktop-open');
        closePicker();
      } else {
        fabOpenBtn.style.display = 'block';
        document.body.classList.remove('desktop-open');
      }
    }

    window.addEventListener('resize', syncUiVisibility);

    createButtons();
    syncUiVisibility();
    renderResults();
  </script>
</body>
</html>
