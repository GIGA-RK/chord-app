<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Chord Atlas</title>
  <style>
    :root{
      --panel:rgba(18,27,41,.84); --panel-strong:rgba(14,21,33,.96);
      --line:rgba(255,255,255,.09); --line-strong:rgba(255,255,255,.15);
      --text:#ecf3ff; --muted:#aab9d0; --muted2:#8c9eb8;
      --accent:#67d4ff; --accent3:#4ef1c0; --warning:#ffbd66; --danger:#ff8ea1;
      --shadow:0 16px 42px rgba(0,0,0,.30); --shadow-soft:0 10px 24px rgba(0,0,0,.20);
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;height:100%}
    body{
      min-height:100vh;color:var(--text);font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif;
      background:
        radial-gradient(circle at top left, rgba(124,140,255,.18), transparent 28%),
        radial-gradient(circle at top right, rgba(103,212,255,.14), transparent 24%),
        linear-gradient(180deg, #091018 0%, #0b1017 32%, #0d1320 100%);
      -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;overflow:hidden
    }
    #currentChordMeta{display:none!important}
    .noise{position:fixed;inset:0;pointer-events:none;opacity:.05;background-image:radial-gradient(rgba(255,255,255,.5) .5px, transparent .7px);background-size:10px 10px;mix-blend-mode:soft-light}
    .app{position:relative;height:100dvh;width:100%;padding:8px;min-height:0}
    .main-panel{position:relative;height:100%;min-height:0;background:var(--panel);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column;min-width:0}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px;border-bottom:1px solid var(--line);background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));flex:0 0 auto;flex-wrap:nowrap;min-width:0}
    .title-wrap{min-width:0;flex:1 1 auto;display:flex;align-items:center;gap:10px}
    .title{margin:0;font-size:clamp(20px,3vw,30px);line-height:1;letter-spacing:-.03em;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .title .slash{color:var(--warning)}
    .capo-indicator{display:none;flex:0 0 auto;padding:5px 9px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--warning);font-size:11px;font-weight:800;white-space:nowrap}
    .capo-indicator.show{display:inline-flex;align-items:center}
    .top-actions{display:flex;align-items:center;gap:8px;flex:0 0 auto;flex-wrap:nowrap;justify-content:flex-end;min-width:0}
    .badge{display:inline-flex;align-items:center;gap:6px;padding:6px 9px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--muted);font-size:11px;font-weight:800;white-space:nowrap}
    .badge strong{color:var(--text);font-size:12px}
    .toolbar-btn,.note-btn,.chip,.mini-chip,.action-btn,.sheet-close,.sort-select,.card-action-btn,.song-btn{appearance:none;-webkit-appearance:none;border:none;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;transition:transform .12s ease,border-color .12s ease,background .12s ease,color .12s ease,box-shadow .12s ease}
    .toolbar-btn:active,.note-btn:active,.chip:active,.mini-chip:active,.action-btn:active,.sheet-close:active,.card-action-btn:active,.song-btn:active{transform:scale(.98)}
    .toolbar-btn{min-height:36px;padding:6px 12px;border-radius:10px;font-size:13px;font-weight:800;white-space:nowrap}
    .toolbar-primary{color:#051018;background:linear-gradient(135deg,var(--accent3),var(--accent));box-shadow:0 10px 18px rgba(78,241,192,.14)}
    .toolbar-secondary{color:var(--muted);border:1px solid var(--line);background:rgba(255,255,255,.03)}
    .toolbar-accent{color:#eaf7ff;border:1px solid rgba(103,212,255,.28);background:linear-gradient(135deg, rgba(103,212,255,.16), rgba(124,140,255,.12))}
    .sort-wrap{display:flex;align-items:center;gap:6px;padding:4px 8px;border-radius:10px;border:1px solid var(--line);background:rgba(255,255,255,.03);white-space:nowrap}
    .sort-label{font-size:10px;font-weight:800;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
    .sort-select{min-height:26px;padding:4px 24px 4px 8px;border-radius:8px;border:1px solid var(--line);background:rgba(255,255,255,.05);color:var(--text);font-size:11px;font-weight:700;outline:none}
    .result-body{padding:12px;flex:1 1 auto;min-height:0;width:100%;display:block;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
    .group-title{margin:0 0 12px;color:var(--muted);font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase}
    .diagram-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;align-items:stretch;align-content:start;width:100%}
    .diagram-card{background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.018));border:1px solid var(--line);border-radius:16px;padding:12px;box-shadow:var(--shadow-soft);display:flex;flex-direction:column;min-width:0;min-height:220px}
    .diagram-svg-wrap{width:100%;min-height:150px;display:flex;align-items:center;justify-content:center;margin-top:0}
    .diagram-svg-wrap svg{display:block;width:100%;max-width:118px;height:auto;overflow:visible;flex:0 0 auto}
    .voicing-meta{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:auto;padding-top:8px}
    .card-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:10px}
    .meta-pill{padding:5px 8px;border-radius:999px;background:rgba(255,255,255,.035);border:1px solid var(--line);color:var(--muted);font-size:11px;font-weight:700;max-width:100%;overflow-wrap:anywhere}
    .meta-pill.warning{color:#fff;border-color:rgba(255,189,102,.38);background:linear-gradient(135deg, rgba(255,189,102,.16), rgba(124,140,255,.12))}
    .meta-pill.danger{color:#fff;border-color:rgba(255,142,161,.35);background:linear-gradient(135deg, rgba(255,142,161,.18), rgba(124,140,255,.12))}
    .card-action-btn{min-height:34px;padding:6px 12px;border-radius:10px;font-size:12px;font-weight:800;border:1px solid var(--line);background:rgba(255,255,255,.03);color:var(--text)}
    .card-action-btn.add{background:linear-gradient(135deg, rgba(78,241,192,.18), rgba(103,212,255,.12));border-color:rgba(78,241,192,.35)}
    .empty{display:grid;place-items:center;min-height:260px;text-align:center;padding:20px}
    .empty .orb{width:46px;height:46px;border-radius:999px;background:radial-gradient(circle at 30% 30%, rgba(255,255,255,.35), transparent 30%),linear-gradient(135deg, rgba(103,212,255,.35), rgba(124,140,255,.28), rgba(78,241,192,.20));box-shadow:0 0 50px rgba(103,212,255,.18);margin:0 auto 12px}
    .empty h3{margin:0 0 8px;font-size:22px;letter-spacing:-.02em}
    .empty p{max-width:580px;margin:0 auto;color:var(--muted);line-height:1.6;font-size:14px}
    .overlay,.sheet-overlay{position:fixed;inset:0;background:rgba(2,7,15,.58);opacity:0;pointer-events:none;transition:opacity .18s ease;z-index:20}
    .overlay.open,.sheet-overlay.open{opacity:1;pointer-events:auto}
    .picker-sheet,.song-sheet{position:fixed;left:50%;transform:translateX(-50%) translateY(110%);bottom:8px;width:min(92vw,440px);max-height:78dvh;background:var(--panel-strong);border:1px solid var(--line);border-radius:22px;box-shadow:0 24px 50px rgba(0,0,0,.38);overflow:hidden;display:flex;flex-direction:column;z-index:30;transition:transform .22s ease}
    .picker-sheet.open,.song-sheet.open{transform:translateX(-50%) translateY(0)}
    .song-sheet{z-index:35;width:min(96vw,980px);max-height:80dvh}
    .desktop-selector{display:block;position:fixed;top:8px;right:8px;bottom:8px;width:min(360px,31vw);background:var(--panel-strong);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);overflow:hidden;z-index:25}
    .desktop-selector .controls-scroll{height:calc(100% - 53px)}
    .desktop-selector .sheet-close{display:none}
    body.desktop-open .app{padding-right:min(376px, calc(31vw + 16px))}
    body.desktop-open .overlay{display:none}
    .sheet-head{padding:12px 14px 10px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:8px;flex:0 0 auto;background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01))}
    .sheet-title{font-size:15px;font-weight:800;letter-spacing:.03em}
    .sheet-subtitle{color:var(--muted);font-size:12px;margin-top:2px}
    .sheet-close{width:34px;height:34px;border-radius:999px;background:rgba(255,255,255,.04);border:1px solid var(--line);color:var(--muted);font-size:18px;line-height:1}
    .controls-scroll{padding:14px;overflow:auto;min-height:0;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
    .section{margin-bottom:14px}.section:last-child{margin-bottom:0}
    .section-label{display:flex;align-items:center;gap:8px;margin:0 0 10px;color:var(--muted);font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
    .section-label::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,var(--line-strong),transparent)}
    .note-grid,.slash-row,.capo-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .quality-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
    .note-btn{min-height:42px;border-radius:11px;border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.02));color:var(--text);font-weight:700;font-size:15px;box-shadow:inset 0 1px 0 rgba(255,255,255,.05)}
    .note-btn.selected{background:linear-gradient(135deg,rgba(103,212,255,.25),rgba(124,140,255,.22));border-color:rgba(103,212,255,.55);box-shadow:0 0 0 1px rgba(103,212,255,.25) inset,0 8px 20px rgba(103,212,255,.12);color:#fff}
    .chip{min-height:42px;padding:8px 10px;border-radius:11px;border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.02));color:var(--text);font-size:13px;font-weight:700;text-align:center;line-height:1.2}
    .chip.selected{border-color:rgba(78,241,192,.48);background:linear-gradient(135deg,rgba(78,241,192,.18),rgba(103,212,255,.12));box-shadow:0 8px 20px rgba(78,241,192,.08)}
    .mini-chip{min-height:38px;padding:6px 6px;border-radius:10px;border:1px solid var(--line);background:rgba(255,255,255,.03);color:var(--muted);font-size:12px;font-weight:800}
    .mini-chip.selected{background:linear-gradient(135deg,rgba(255,189,102,.18),rgba(124,140,255,.16));border-color:rgba(255,189,102,.45);color:#fff}
    .action-row,.sheet-actions,.sheet-kpi,.song-meta{display:flex;gap:8px;flex-wrap:wrap}
    .action-row{margin-top:8px}
    .action-btn{min-height:34px;padding:6px 12px;border-radius:10px;font-size:12px;font-weight:800}
    .action-secondary{color:var(--muted);border:1px solid var(--line);background:rgba(255,255,255,.03)}
    .action-primary{color:#051018;background:linear-gradient(135deg,var(--accent3),var(--accent))}
    .song-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;align-content:start}
    .song-card{position:relative;background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.018));border:1px solid var(--line);border-radius:16px;padding:10px;box-shadow:var(--shadow-soft);display:flex;flex-direction:column;min-width:0;min-height:216px}
    .song-num{font-size:11px;font-weight:900;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}
    .song-name{margin-top:4px;font-size:14px;font-weight:800;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .song-sound{margin-top:4px;font-size:11px;color:var(--muted2);min-height:16px}
    .song-svg{display:flex;justify-content:center;align-items:center;min-height:110px;margin:8px 0}
    .song-svg svg{width:100%;max-width:92px;height:auto}
    .song-controls{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px}
    .song-btn{min-height:32px;border-radius:10px;border:1px solid var(--line);background:rgba(255,255,255,.03);color:var(--muted);font-size:12px;font-weight:800}
    .song-btn.danger{color:#fff;border-color:rgba(255,142,161,.34);background:linear-gradient(135deg, rgba(255,142,161,.16), rgba(124,140,255,.10))}
    .hidden-input{display:none!important}
    .fab,.fab-sheet{position:fixed;right:14px;z-index:15;display:none}
    .fab{bottom:14px}.fab-sheet{bottom:64px}
    @media (min-width:1200px){.diagram-grid{grid-template-columns:repeat(auto-fill,minmax(245px,1fr));gap:12px}.diagram-card{min-height:240px;padding:10px}.song-grid{grid-template-columns:repeat(5,minmax(0,1fr))}}
    @media (min-width:1600px){.diagram-grid{grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:10px}.diagram-card{min-height:225px;padding:9px}.song-grid{grid-template-columns:repeat(6,minmax(0,1fr))}.meta-pill{font-size:10px;padding:4px 7px}}
    @media (max-width:900px){.diagram-grid,.song-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.badge.mode-badge{display:none}}
    @media (max-width:640px){.app{padding:8px}.topbar{align-items:center;gap:8px;padding:8px 10px}.title-wrap{flex:1 1 auto;min-width:0;gap:8px}.title{font-size:20px}.capo-indicator{font-size:10px;padding:4px 7px}.badge{font-size:10px;padding:5px 7px}.sort-wrap{display:none}.top-actions{gap:6px;flex-wrap:nowrap}.toolbar-btn{min-height:40px;padding:6px 12px;font-size:13px}.toolbar-secondary.inline-reset{display:none}.result-body{padding:8px}.diagram-grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.diagram-card{min-height:205px;padding:8px;border-radius:14px}.diagram-svg-wrap{min-height:102px}.diagram-svg-wrap svg{max-width:108px}.meta-pill{font-size:11px;padding:4px 6px}.card-action-btn{min-height:32px;font-size:11px;padding:4px 9px}.picker-sheet,.song-sheet{left:8px;right:8px;width:auto;max-height:78dvh;bottom:8px;transform:translateY(110%);border-radius:20px}.picker-sheet.open,.song-sheet.open{transform:translateY(0)}.sheet-head{padding:10px 10px 8px}.controls-scroll{padding:10px}.section{margin-bottom:10px}.section-label{font-size:11px;margin-bottom:7px}.note-grid,.slash-row,.quality-grid,.capo-grid{gap:6px}.note-btn{min-height:38px;font-size:14px}.chip{min-height:38px;font-size:12px;padding:7px 8px}.mini-chip{min-height:34px;font-size:11px;padding:5px 4px}.action-btn{min-height:32px;padding:4px 10px;font-size:12px}.song-grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.song-card{min-height:198px;padding:8px}.song-name{font-size:12px}.song-sound{font-size:10px}.song-svg{min-height:96px;margin:6px 0}.song-svg svg{max-width:86px}.song-controls{gap:4px}.song-btn{min-height:30px;font-size:11px}.fab,.fab-sheet{display:block}.desktop-selector{display:none!important}}
  </style>
</head>
<body>
<div class="noise"></div>
<div class="app">
  <section class="main-panel">
    <div class="topbar">
      <div class="title-wrap">
        <h1 class="title" id="currentChordLabel">コードを選択</h1>
        <div class="capo-indicator" id="capoIndicator">Capo 0</div>
        <div class="subtitle" id="currentChordMeta"></div>
      </div>
      <div class="top-actions">
        <div class="badge mode-badge">モード <strong id="modeLabel">コード</strong></div>
        <div class="sort-wrap"><span class="sort-label">並び</span><select id="sortSelect" class="sort-select"><option value="recommended">おすすめ</option><option value="lowfret">低フレット</option><option value="open">開放優先</option><option value="bass">低音優先</option></select></div>
        <button class="toolbar-btn toolbar-accent" id="openSongSheetBtn" type="button">楽譜</button>
        <button class="toolbar-btn toolbar-primary" id="openPickerBtn" type="button">選択</button>
        <button class="toolbar-btn toolbar-secondary inline-reset" id="resetBtnTop" type="button">リセット</button>
      </div>
    </div>
    <div class="result-body" id="resultBody"><div class="empty"><div><div class="orb"></div><h3>準備完了</h3><p>実音でコードを選ぶと、カポがある場合は自動でフォームに変換して候補を表示します。</p></div></div></div>
  </section>
  <button class="toolbar-btn toolbar-primary fab" id="fabOpenBtn" type="button">選択</button>
  <button class="toolbar-btn toolbar-accent fab-sheet" id="fabSongBtn" type="button">楽譜</button>
  <div class="overlay" id="overlay"></div>
  <div class="sheet-overlay" id="sheetOverlay"></div>
  <aside class="picker-sheet" id="pickerSheet" aria-hidden="true"></aside>
  <aside class="song-sheet" id="songSheet" aria-hidden="true"></aside>
  <aside class="desktop-selector" id="desktopSelector" aria-hidden="false"></aside>
  <input id="jsonFileInput" class="hidden-input" type="file" accept="application/json,.json" />
</div>
<script>
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const STRING_PC = [4,9,2,7,11,4];
const MAX_FRET = 15;
const QUALITIES = [
  {key:'maj',suffix:'',label:'Major',intervals:[0,4,7]},
  {key:'min',suffix:'m',label:'Minor',intervals:[0,3,7]},
  {key:'7',suffix:'7',label:'7',intervals:[0,4,7,10]},
  {key:'m7',suffix:'m7',label:'m7',intervals:[0,3,7,10]},
  {key:'maj7',suffix:'maj7',label:'maj7',intervals:[0,4,7,11]},
  {key:'6',suffix:'6',label:'6',intervals:[0,4,7,9]},
  {key:'m6',suffix:'m6',label:'m6',intervals:[0,3,7,9]},
  {key:'dim',suffix:'dim',label:'dim',intervals:[0,3,6]},
  {key:'dim7',suffix:'dim7',label:'dim7',intervals:[0,3,6,9]},
  {key:'m7b5',suffix:'m7♭5',label:'m7♭5',intervals:[0,3,6,10]},
  {key:'aug',suffix:'aug',label:'aug',intervals:[0,4,8]},
  {key:'sus4',suffix:'sus4',label:'sus4',intervals:[0,5,7]},
  {key:'sus2',suffix:'sus2',label:'sus2',intervals:[0,2,7]}
];
const QUALITY_BY_KEY = Object.fromEntries(QUALITIES.map(q => [q.key, q]));
const EXPLICIT_FORMS = {
 'C_maj':[{label:'Open',frets:[null,3,2,0,1,0]},{label:'C shape / 12fr',frets:[8,10,10,9,8,8]},{label:'A shape / 3fr',frets:[null,3,5,5,5,3]}],
 'D_maj':[{label:'Open',frets:[null,null,0,2,3,2]},{label:'A shape / 5fr',frets:[null,5,7,7,7,5]},{label:'E shape / 10fr',frets:[10,12,12,11,10,10]}],
 'E_maj':[{label:'Open',frets:[0,2,2,1,0,0]},{label:'A shape / 7fr',frets:[null,7,9,9,9,7]},{label:'C shape / 4fr',frets:[null,7,6,4,5,4]}],
 'G_maj':[{label:'Open',frets:[3,2,0,0,0,3]},{label:'E shape / 3fr',frets:[3,5,5,4,3,3]},{label:'D shape / 7fr',frets:[null,null,5,7,8,7]}],
 'A_maj':[{label:'Open',frets:[null,0,2,2,2,0]},{label:'E shape / 5fr',frets:[5,7,7,6,5,5]},{label:'D shape / 9fr',frets:[null,null,7,9,10,9]}],
 'A_min':[{label:'Open',frets:[null,0,2,2,1,0]},{label:'E shape / 5fr',frets:[5,7,7,5,5,5]},{label:'Am shape / 12fr',frets:[null,12,14,14,13,12]}],
 'D_min':[{label:'Open',frets:[null,null,0,2,3,1]},{label:'A shape / 5fr',frets:[null,5,7,7,6,5]},{label:'E shape / 10fr',frets:[10,12,12,10,10,10]}],
 'E_min':[{label:'Open',frets:[0,2,2,0,0,0]},{label:'Am shape / 7fr',frets:[null,7,9,9,8,7]},{label:'Em shape / 12fr',frets:[12,14,14,12,12,12]}],
 'A_7':[{label:'Open',frets:[null,0,2,0,2,0]},{label:'E7 shape / 5fr',frets:[5,7,5,6,5,5]},{label:'A7 barre / 12fr',frets:[null,12,14,12,14,12]}],
 'C_7':[{label:'Open',frets:[null,3,2,3,1,0]},{label:'A7 shape / 3fr',frets:[null,3,5,3,5,3]},{label:'E7 shape / 8fr',frets:[8,10,8,9,8,8]}],
 'D_7':[{label:'Open',frets:[null,null,0,2,1,2]},{label:'A7 shape / 5fr',frets:[null,5,7,5,7,5]},{label:'E7 shape / 10fr',frets:[10,12,10,11,10,10]}],
 'E_7':[{label:'Open',frets:[0,2,0,1,0,0]},{label:'A7 shape / 7fr',frets:[null,7,9,7,9,7]},{label:'E7 shape / 12fr',frets:[12,14,12,13,12,12]}],
 'G_7':[{label:'Open',frets:[3,2,0,0,0,1]},{label:'E7 shape / 3fr',frets:[3,5,3,4,3,3]},{label:'D7 shape / 7fr',frets:[null,null,5,7,6,7]}],
