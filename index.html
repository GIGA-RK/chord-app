<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Chord Atlas</title>

  <style>
    :root{
      --bg:#0b1017;
      --bg2:#0f1724;
      --panel:rgba(18, 27, 41, 0.78);
      --line:rgba(255,255,255,0.08);
      --line-strong:rgba(255,255,255,0.13);

      --text:#ecf3ff;
      --muted:#9db0ca;
      --muted2:#7e90a9;

      --accent:#67d4ff;
      --accent2:#7c8cff;
      --accent3:#4ef1c0;
      --warning:#ffbd66;
      --danger:#ff7f8e;

      --card-radius:18px;
      --radius:14px;
      --shadow:0 16px 42px rgba(0,0,0,0.30);
      --shadow-soft:0 10px 24px rgba(0,0,0,0.20);
    }

    *{ box-sizing:border-box; }
    html,body{ margin:0; padding:0; }

    body{
      min-height:100vh;
      color:var(--text);
      font-family:Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(124,140,255,0.18), transparent 28%),
        radial-gradient(circle at top right, rgba(103,212,255,0.14), transparent 24%),
        linear-gradient(180deg, #091018 0%, #0b1017 32%, #0d1320 100%);
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }

    .noise{
      position:fixed;
      inset:0;
      pointer-events:none;
      opacity:.06;
      background-image: radial-gradient(rgba(255,255,255,.5) 0.5px, transparent 0.7px);
      background-size:10px 10px;
      mix-blend-mode:soft-light;
    }

    .wrap{
      max-width:1040px;
      margin:0 auto;
      padding:16px 14px 38px;
    }

    .hero{
      padding:10px 2px 12px;
    }

    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:8px;
      color:var(--muted);
      font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size:11px;
      letter-spacing:.14em;
      text-transform:uppercase;
      margin-bottom:8px;
    }

    .eyebrow::before{
      content:"";
      width:8px;
      height:8px;
      border-radius:999px;
      background:linear-gradient(135deg, var(--accent), var(--accent3));
      box-shadow:0 0 16px rgba(103,212,255,.45);
    }

    .hero h1{
      margin:0;
      font-size:clamp(28px, 5vw, 46px);
      line-height:1.02;
      letter-spacing:-0.03em;
      font-weight:800;
    }

    .hero h1 .grad{
      background:linear-gradient(135deg, #ffffff 0%, #b8cbff 34%, #74e8ff 100%);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
    }

    .hero p{
      margin:10px 0 0;
      color:var(--muted);
      font-size:13px;
      line-height:1.65;
      max-width:680px;
    }

    .layout{
      display:grid;
      grid-template-columns:320px 1fr;
      gap:14px;
      align-items:start;
      margin-top:10px;
    }

    .panel{
      background:var(--panel);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border:1px solid var(--line);
      border-radius:var(--card-radius);
      box-shadow:var(--shadow);
    }

    .controls{
      position:sticky;
      top:10px;
      overflow:hidden;
    }

    .panel-inner{
      padding:14px;
    }

    .section{
      margin-bottom:14px;
    }

    .section:last-child{
      margin-bottom:0;
    }

    .section-label{
      display:flex;
      align-items:center;
      gap:8px;
      margin:0 0 10px;
      color:var(--muted);
      font-size:11px;
      font-weight:700;
      letter-spacing:.12em;
      text-transform:uppercase;
      font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    .section-label::after{
      content:"";
      flex:1;
      height:1px;
      background:linear-gradient(90deg, var(--line-strong), transparent);
    }

    .note-grid{
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      gap:8px;
    }

    .quality-grid{
      display:grid;
      grid-template-columns:repeat(2, 1fr);
      gap:8px;
    }

    .slash-row{
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      gap:8px;
    }

    .note-btn,.chip,.mini-chip,.action-btn{
      appearance:none;
      -webkit-appearance:none;
      border:none;
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
      transition:transform .12s ease, border-color .12s ease, background .12s ease, color .12s ease, box-shadow .12s ease;
    }

    .note-btn{
      min-height:42px;
      border-radius:12px;
      border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      color:var(--text);
      font-weight:700;
      font-size:14px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .note-btn:active{ transform:scale(.98); }

    .note-btn.selected{
      background:linear-gradient(135deg, rgba(103,212,255,.25), rgba(124,140,255,.22));
      border-color:rgba(103,212,255,.55);
      box-shadow:0 0 0 1px rgba(103,212,255,.25) inset, 0 8px 20px rgba(103,212,255,.12);
      color:#fff;
    }

    .chip{
      min-height:42px;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      color:var(--text);
      font-size:13px;
      font-weight:700;
      text-align:center;
      line-height:1.2;
    }

    .chip.selected{
      border-color:rgba(78,241,192,.48);
      background:linear-gradient(135deg, rgba(78,241,192,.18), rgba(103,212,255,.12));
      box-shadow:0 8px 20px rgba(78,241,192,.08);
    }

    .mini-chip{
      min-height:40px;
      padding:8px 6px;
      border-radius:11px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
      color:var(--muted);
      font-size:12px;
      font-weight:800;
    }

    .mini-chip.selected{
      background:linear-gradient(135deg, rgba(255,189,102,.18), rgba(124,140,255,.16));
      border-color:rgba(255,189,102,.45);
      color:#fff;
    }

    .action-row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .action-btn{
      min-height:42px;
      padding:10px 14px;
      border-radius:12px;
      font-size:13px;
      font-weight:800;
    }

    .action-secondary{
      color:var(--muted);
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
    }

    .result-panel{
      min-height:560px;
      overflow:hidden;
    }

    .summary{
      padding:16px 16px 14px;
      border-bottom:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
    }

    .summary-top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }

    .summary h2{
      margin:0;
      font-size:clamp(24px, 5vw, 38px);
      line-height:1.05;
      letter-spacing:-0.03em;
      font-weight:800;
    }

    .summary h2 .slash{
      color:var(--warning);
    }

    .summary .meta{
      color:var(--muted);
      font-size:13px;
      margin-top:8px;
      line-height:1.6;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:7px 10px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      color:var(--muted);
      font-size:11px;
      font-weight:800;
      white-space:nowrap;
    }

    .badge strong{
      color:var(--text);
      font-size:12px;
    }

    .result-body{
      padding:14px;
    }

    .group-title{
      margin:0 0 12px;
      color:var(--muted);
      font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size:11px;
      font-weight:700;
      letter-spacing:.12em;
      text-transform:uppercase;
    }

    /* ===== 修正済み：PCは基本3列 ===== */
    .diagram-grid{
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      gap:12px;
      align-items:stretch;
    }

    /* ===== 修正済み：カード高さを安定化 ===== */
    .diagram-card{
      background:linear-gradient(180deg, rgba(255,255,255,.035), rgba(255,255,255,.018));
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
      box-shadow:var(--shadow-soft);

      display:flex;
      flex-direction:column;
      min-width:0;
      min-height:320px;
    }

    .diagram-header{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      margin-bottom:8px;
    }

    .diagram-title{
      font-size:13px;
      font-weight:800;
      color:var(--text);
      line-height:1.2;
    }

    .diagram-sub{
      font-size:11px;
      color:var(--muted2);
      margin-top:4px;
      line-height:1.3;
    }

    .fret-pill{
      flex:0 0 auto;
      padding:6px 9px;
      border-radius:999px;
      background:rgba(255,255,255,.04);
      border:1px solid var(--line);
      color:var(--muted);
      font-size:10px;
      font-weight:800;
      letter-spacing:.08em;
      text-transform:uppercase;
      font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    /* ===== 修正済み：SVG専用領域で上下崩れ防止 ===== */
    .diagram-svg-wrap{
      width:100%;
      min-height:170px;
      display:flex;
      align-items:center;
      justify-content:center;
      margin-top:6px;
    }

    .diagram-svg-wrap svg{
      display:block;
      width:100%;
      max-width:170px;
      height:auto;
      overflow:visible;
      flex:0 0 auto;
    }

    /* ===== 修正済み：メタ情報をカード下に揃える ===== */
    .voicing-meta{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
      margin-top:auto;
      padding-top:8px;
    }

    .meta-pill{
      padding:5px 8px;
      border-radius:999px;
      background:rgba(255,255,255,.035);
      border:1px solid var(--line);
      color:var(--muted);
      font-size:11px;
      font-weight:700;
      max-width:100%;
      overflow-wrap:anywhere;
    }

    .empty{
      display:grid;
      place-items:center;
      min-height:380px;
      text-align:center;
      padding:24px;
    }

    .empty .orb{
      width:58px;
      height:58px;
      border-radius:999px;
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,.35), transparent 30%),
        linear-gradient(135deg, rgba(103,212,255,.35), rgba(124,140,255,.28), rgba(78,241,192,.20));
      box-shadow:0 0 50px rgba(103,212,255,.18);
      margin:0 auto 14px;
    }

    .empty h3{
      margin:0 0 8px;
      font-size:20px;
      letter-spacing:-0.02em;
    }

    .empty p{
      max-width:480px;
      margin:0 auto;
      color:var(--muted);
      line-height:1.7;
      font-size:13px;
    }

    footer{
      margin-top:16px;
      color:var(--muted2);
      text-align:center;
      font-size:11px;
      padding:4px 10px;
    }

    /* 中間幅では2列 */
    @media (max-width: 900px){
      .layout{
        grid-template-columns:1fr;
      }
      .controls{
        position:relative;
        top:0;
      }
      .result-panel{
        min-height:unset;
      }

      .diagram-grid{
        grid-template-columns:repeat(2, minmax(0, 1fr));
      }
    }

    /* iPhoneでは1列 */
    @media (max-width: 640px){
      .wrap{
        padding:12px 10px 28px;
      }
      .panel-inner,.result-body{
        padding:12px;
      }
      .summary{
        padding:14px 12px 12px;
      }
      .quality-grid{
        grid-template-columns:repeat(2, 1fr);
      }
      .diagram-grid{
        grid-template-columns:1fr;
      }
      .hero p{
        font-size:12.5px;
      }
    }

    @media (prefers-reduced-motion: reduce){
      *{ transition:none !important; scroll-behavior:auto !important; }
    }
  </style>
</head>
<body>
  <div class="noise"></div>

  <div class="wrap">
    <header class="hero">
      <div class="eyebrow">Guitar Chord Search</div>
      <h1><span class="grad">Chord Atlas</span></h1>
      <p>ルート音・コードタイプ・ベース音（分数コード）を選ぶと、押さえ方候補を自動表示します。</p>
    </header>

    <main class="layout">
      <aside class="panel controls">
        <div class="panel-inner">
          <section class="section">
            <p class="section-label">Root</p>
            <div class="note-grid" id="rootGrid"></div>
          </section>

          <section class="section">
            <p class="section-label">Code Type</p>
            <div class="quality-grid" id="qualityGrid"></div>
          </section>

          <section class="section">
            <p class="section-label">Bass</p>
            <div class="slash-row" id="bassGrid"></div>
          </section>

          <div class="action-row">
            <button class="action-btn action-secondary" id="resetBtn">Reset</button>
          </div>
        </div>
      </aside>

      <section class="panel result-panel">
        <div class="summary">
          <div class="summary-top">
            <div>
              <h2 id="currentChordLabel">Select a chord</h2>
              <div class="meta" id="currentChordMeta">
                Choose root, type, and optional bass note.
              </div>
            </div>
            <div class="badge">
              Mode <strong id="modeLabel">Chord</strong>
            </div>
          </div>
        </div>

        <div class="result-body" id="resultBody">
          <div class="empty">
            <div>
              <div class="orb"></div>
              <h3>Ready</h3>
              <p>Select a root and chord type to show voicings.</p>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer>Open forms + movable voicings + slash chord filter</footer>
  </div>

  <script>
    const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
    const STRING_PC = [4, 9, 2, 7, 11, 4]; // E A D G B e

    const QUALITIES = [
      {key:'maj',  suffix:'',     label:'Major', intervals:[0,4,7]},
      {key:'min',  suffix:'m',    label:'Minor', intervals:[0,3,7]},
      {key:'7',    suffix:'7',    label:'7',     intervals:[0,4,7,10]},
      {key:'m7',   suffix:'m7',   label:'m7',    intervals:[0,3,7,10]},
      {key:'maj7', suffix:'maj7', label:'maj7',  intervals:[0,4,7,11]},
      {key:'6',    suffix:'6',    label:'6',     intervals:[0,4,7,9]},
      {key:'m6',   suffix:'m6',   label:'m6',    intervals:[0,3,7,9]},
      {key:'dim',  suffix:'dim',  label:'dim',   intervals:[0,3,6]},
      {key:'dim7', suffix:'dim7', label:'dim7',  intervals:[0,3,6,9]},
      {key:'m7b5', suffix:'m7♭5', label:'m7♭5',  intervals:[0,3,6,10]},
      {key:'aug',  suffix:'aug',  label:'aug',   intervals:[0,4,8]},
      {key:'sus4', suffix:'sus4', label:'sus4',  intervals:[0,5,7]},
      {key:'sus2', suffix:'sus2', label:'sus2',  intervals:[0,2,7]},
    ];
    const QUALITY_BY_KEY = Object.fromEntries(QUALITIES.map(q => [q.key, q]));

    function chordKey(rootPC, qualityKey){
      return NOTE_NAMES[rootPC] + '_' + qualityKey;
    }

    const OPEN_CHORDS = {
      'C_maj':[null,3,2,0,1,0],
      'D_maj':[null,null,0,2,3,2],
      'E_maj':[0,2,2,1,0,0],
      'G_maj':[3,2,0,0,0,3],
      'A_maj':[null,0,2,2,2,0],

      'A_min':[null,0,2,2,1,0],
      'D_min':[null,null,0,2,3,1],
      'E_min':[0,2,2,0,0,0],

      'A_7':[null,0,2,0,2,0],
      'C_7':[null,3,2,3,1,0],
      'D_7':[null,null,0,2,1,2],
      'E_7':[0,2,0,1,0,0],
      'G_7':[3,2,0,0,0,1],

      'A_m7':[null,0,2,0,1,0],
      'D_m7':[null,null,0,2,1,1],
      'E_m7':[0,2,0,0,0,0],

      'C_maj7':[null,3,2,0,0,0],
      'D_maj7':[null,null,0,2,2,2],
      'E_maj7':[0,2,1,1,0,0],
      'G_maj7':[3,2,0,0,0,2],
      'A_maj7':[null,0,2,1,2,0],

      'C_maj_slash_E':[0,3,2,0,1,0],
      'D_maj_slash_F#':[2,null,0,2,3,2],
      'G_maj_slash_B':[null,2,0,0,0,3],
      'C_maj_slash_G':[3,3,2,0,1,0],
      'D_min_slash_F':[1,null,0,2,3,1],
      'A_min_slash_C':[null,3,2,2,1,0],
      'F_maj_slash_C':[null,3,3,2,1,1],
      'G_7_slash_B':[null,2,0,0,0,1],
    };

    function getPitchClassOnString(stringIdx, fret){
      return (STRING_PC[stringIdx] + fret) % 12;
    }

    function getLowestSoundingPC(shape){
      for (let i=0; i<shape.frets.length; i++){
        const f = shape.frets[i];
        if (f !== null) return getPitchClassOnString(i, f);
      }
      return null;
    }

    function getPitchClassesInShape(shape){
      const pcs = [];
      shape.frets.forEach((f, i) => {
        if (f !== null) pcs.push(getPitchClassOnString(i, f));
      });
      return pcs;
    }

    function uniqueKeyFromFrets(frets){
      return frets.map(v => v === null ? 'x' : String(v)).join('-');
    }

    function hasChordTones(shape, requiredPCs, minimumCount = 3){
      const pcs = new Set(getPitchClassesInShape(shape));
      const found = requiredPCs.filter(pc => pcs.has(pc));
      return found.length >= Math.min(requiredPCs.length, minimumCount);
    }

    function buildBarreShape(rootPC, intervals, shapeType, span = 4){
      const rootStringIdx = shapeType === 'E' ? 0 : 1;
      const R = ((rootPC - STRING_PC[rootStringIdx]) % 12 + 12) % 12;
      const chordTones = new Set(intervals.map(iv => (rootPC + iv) % 12));
      const frets = new Array(6).fill(null);
      frets[rootStringIdx] = R;

      for (let s=0; s<6; s++){
        if (s === rootStringIdx) continue;
        if (shapeType === 'A' && s === 0) continue;

        let best = null;
        for (let f=R; f<=R+span; f++){
          const pc = (STRING_PC[s] + f) % 12;
          if (chordTones.has(pc)){
            best = f;
            break;
          }
        }
        frets[s] = best;
      }

      return {frets, baseFret:R, kind:'barre', label:shapeType === 'E' ? 'E-shape' : 'A-shape'};
    }

    function possibleFretsForPCOnString(stringIdx, pc, maxFret = 12){
      const out = [];
      for (let f=0; f<=maxFret; f++){
        if ((STRING_PC[stringIdx] + f) % 12 === pc) out.push(f);
      }
      return out;
    }

    function chooseBestFretOnString(stringIdx, chordTones, requiredMissing, minF, maxF){
      const candidates = [];
      for (let f=minF; f<=maxF; f++){
        const pc = (STRING_PC[stringIdx] + f) % 12;
        if (chordTones.has(pc)) candidates.push({f, pc});
      }
      if (!candidates.length) return null;
      const preferred = candidates.find(c => requiredMissing.has(c.pc));
      if (preferred) return preferred.f;
      return candidates[0].f;
    }

    function generateSlashVoicings(rootPC, intervals, bassPC){
      const chordTones = new Set(intervals.map(iv => (rootPC + iv) % 12));
      const requiredPCs = [...chordTones];
      const results = [];
      const seen = new Set();
      const bassStrings = [0,1,2];

      for (const bassStringIdx of bassStrings){
        const bassFrets = possibleFretsForPCOnString(bassStringIdx, bassPC, 12);

        for (const bassFret of bassFrets){
          const frets = new Array(6).fill(null);

          for (let s=0; s<bassStringIdx; s++) frets[s] = null;
          frets[bassStringIdx] = bassFret;

          const baseFret = bassFret === 0 ? 0 : bassFret;
          const minF = bassFret === 0 ? 0 : bassFret;
          const maxF = bassFret === 0 ? 4 : bassFret + 4;

          const present = new Set([bassPC]);

          for (let s=bassStringIdx+1; s<6; s++){
            const missing = new Set(requiredPCs.filter(pc => !present.has(pc)));
            const chosen = chooseBestFretOnString(s, chordTones, missing, minF, maxF);
            frets[s] = chosen;
            if (chosen !== null) present.add((STRING_PC[s] + chosen) % 12);
          }

          const shape = {
            frets,
            baseFret,
            kind:'slash',
            label:'Slash Voicing',
            bassStringIdx
          };

          const lowest = getLowestSoundingPC(shape);
          if (lowest !== bassPC) continue;
          if (!hasChordTones(shape, requiredPCs, intervals.length >= 4 ? 4 : 3)) continue;

          const key = uniqueKeyFromFrets(frets);
          if (!seen.has(key)){
            seen.add(key);
            results.push(shape);
          }
        }
      }

      return results;
    }

    function findNamedOpenSlash(rootPC, qualityKey, bassPC){
      const rootName = NOTE_NAMES[rootPC];
      const q = qualityKey;
      const bassName = NOTE_NAMES[bassPC];
      const qualityWord = q === 'maj' ? 'maj' : q === 'min' ? 'min' : q;
      const key = `${rootName}_${qualityWord}_slash_${bassName}`;
      return OPEN_CHORDS[key] || null;
    }

    function getShapesFor(rootPC, qualityKey, bassPC = null){
      const q = QUALITY_BY_KEY[qualityKey];
      const shapes = [];
      const openKey = chordKey(rootPC, qualityKey === 'maj' ? 'maj' : qualityKey);

      if (bassPC === null && OPEN_CHORDS[openKey]){
        shapes.push({
          label:'Open',
          frets:OPEN_CHORDS[openKey],
          baseFret:0,
          kind:'open'
        });
      }

      if (bassPC !== null){
        const slashOpen = findNamedOpenSlash(rootPC, qualityKey, bassPC);
        if (slashOpen){
          shapes.push({
            label:'Slash Open',
            frets:slashOpen,
            baseFret:0,
            kind:'slash-open'
          });
        }
      }

      const eShape = buildBarreShape(rootPC, q.intervals, 'E');
      const aShape = buildBarreShape(rootPC, q.intervals, 'A');

      [eShape, aShape].forEach(shape => {
        const lowest = getLowestSoundingPC(shape);
        if (bassPC === null || lowest === bassPC){
          shapes.push({
            ...shape,
            label: shape.label === 'E-shape'
              ? (shape.baseFret === 0 ? 'Open / E' : 'E-form')
              : (shape.baseFret === 0 ? 'Open / A' : 'A-form')
          });
        }
      });

      if (bassPC !== null){
        const slashGenerated = generateSlashVoicings(rootPC, q.intervals, bassPC);
        slashGenerated.forEach(s => {
          shapes.push({
            ...s,
            label: s.baseFret === 0 ? 'Slash Open' : 'Slash'
          });
        });
      }

      const filtered = (bassPC === null)
        ? shapes
        : shapes.filter(s => getLowestSoundingPC(s) === bassPC);

      const deduped = [];
      const seen = new Set();

      for (const s of filtered){
        const key = uniqueKeyFromFrets(s.frets);
        if (!seen.has(key)){
          seen.add(key);
          deduped.push(s);
        }
      }

      deduped.sort((a, b) => {
        const aMuted = a.frets.filter(v => v === null).length;
        const bMuted = b.frets.filter(v => v === null).length;
        if (a.baseFret !== b.baseFret) return a.baseFret - b.baseFret;
        return aMuted - bMuted;
      });

      return deduped.slice(0, 12);
    }

    function renderDiagramSVG(shape){
      const W = 170, H = 225;
      const left = 26, right = W - 18, top = 40, bottom = H - 22;
      const nStrings = 6, nFrets = 5;
      const stepX = (right - left) / (nStrings - 1);
      const stepY = (bottom - top) / nFrets;
      const baseFret = shape.baseFret || 0;
      const showNut = baseFret === 0;

      const gradId1 = 'boardGrad_' + Math.random().toString(36).slice(2, 10);
      const gradId2 = 'markGrad_' + Math.random().toString(36).slice(2, 10);

      let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">`;

      svg += `
        <defs>
          <linearGradient id="${gradId1}" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#131d2d"/>
            <stop offset="100%" stop-color="#0b1017"/>
          </linearGradient>
          <linearGradient id="${gradId2}" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#7cf5ff"/>
            <stop offset="100%" stop-color="#4ef1c0"/>
          </linearGradient>
        </defs>
      `;

      svg += `<rect x="${left-10}" y="${top-4}" width="${right-left+20}" height="${bottom-top+8}" rx="12" fill="url(#${gradId1})" stroke="rgba(255,255,255,0.08)"/>`;

      const dotFrets = [3,5,7,9,12];
      for (let i=1; i<=nFrets; i++){
        const actualFret = baseFret === 0 ? i : baseFret + i - 1;
        if (dotFrets.includes(actualFret)){
          const cy = top + stepY*(i-0.5);
          svg += `<circle cx="${(left+right)/2}" cy="${cy}" r="2.4" fill="rgba(255,255,255,0.10)"/>`;
        }
      }

      for (let i=0; i<=nFrets; i++){
        const y = top + stepY*i;
        const strokeW = (i === 0 && showNut) ? 5 : 1.35;
        svg += `<line x1="${left}" y1="${y}" x2="${right}" y2="${y}" stroke="rgba(236,243,255,0.92)" stroke-width="${strokeW}" opacity="${i===0?1:0.85}"/>`;
      }

      for (let s=0; s<nStrings; s++){
        const x = left + stepX*s;
        svg += `<line x1="${x}" y1="${top}" x2="${x}" y2="${bottom}" stroke="rgba(236,243,255,0.82)" stroke-width="1.25"/>`;
      }

      if (!showNut){
        svg += `<text x="${left-10}" y="${top+stepY*0.75}" fill="#9db0ca" font-family="monospace" font-weight="600" font-size="10" text-anchor="end">${baseFret}f</text>`;
      }

      if (baseFret !== 0){
        const stringsAtBase = shape.frets.map((f,i) => f === baseFret ? i : -1).filter(v => v >= 0);
        if (stringsAtBase.length >= 2){
          const x1 = left + stepX * Math.min(...stringsAtBase);
          const x2 = left + stepX * Math.max(...stringsAtBase);
          const cy = top + stepY * 0.5;
          svg += `<rect x="${x1-8}" y="${cy-7}" width="${x2-x1+16}" height="14" rx="7" fill="rgba(124,140,255,0.58)" stroke="rgba(255,255,255,0.12)"/>`;
        }
      }

      shape.frets.forEach((f, s) => {
        const x = left + stepX*s;

        if (f === null){
          svg += `<text x="${x}" y="${top-13}" fill="#ff8ca3" font-family="monospace" font-size="12" font-weight="700" text-anchor="middle">×</text>`;
          return;
        }

        if (showNut && f === 0){
          svg += `<circle cx="${x}" cy="${top-11}" r="4.8" fill="none" stroke="rgba(236,243,255,0.95)" stroke-width="1.7"/>`;
          return;
        }

        const rowIndex = showNut ? f : (f - baseFret + 1);
        if (rowIndex < 1 || rowIndex > nFrets) return;
        const cy = top + stepY*(rowIndex - 0.5);

        svg += `<circle cx="${x}" cy="${cy}" r="6.8" fill="url(#${gradId2})" stroke="rgba(255,255,255,0.16)" stroke-width="1.1"/>`;
      });

      svg += `</svg>`;
      return svg;
    }

    function parseShapeInfo(shape, bassPC){
      const pcs = [...new Set(getPitchClassesInShape(shape))].map(pc => NOTE_NAMES[pc]).join(' / ');
      const bassName = bassPC !== null ? NOTE_NAMES[bassPC] : NOTE_NAMES[getLowestSoundingPC(shape)];
      return {
        fretText: shape.baseFret === 0 ? 'Open' : `${shape.baseFret}fr`,
        tones: pcs,
        bass: bassName
      };
    }

    let selectedRoot = null;
    let selectedQuality = null;
    let selectedBass = null;

    const rootGrid = document.getElementById('rootGrid');
    const qualityGrid = document.getElementById('qualityGrid');
    const bassGrid = document.getElementById('bassGrid');

    const resultBody = document.getElementById('resultBody');
    const currentChordLabel = document.getElementById('currentChordLabel');
    const currentChordMeta = document.getElementById('currentChordMeta');
    const modeLabel = document.getElementById('modeLabel');

    function renderResults(){
      if (selectedRoot === null || selectedQuality === null){
        currentChordLabel.textContent = 'Select a chord';
        currentChordMeta.textContent = 'Choose root, type, and optional bass note.';
        modeLabel.textContent = 'Chord';

        resultBody.innerHTML = `
          <div class="empty">
            <div>
              <div class="orb"></div>
              <h3>Ready</h3>
              <p>Select a root and chord type to show voicings.</p>
            </div>
          </div>
        `;
        return;
      }

      const q = QUALITY_BY_KEY[selectedQuality];
      const main = `${NOTE_NAMES[selectedRoot]}${q.suffix}`;
      currentChordLabel.innerHTML = selectedBass === null
        ? main
        : `${main}<span class="slash"> / ${NOTE_NAMES[selectedBass]}</span>`;

      currentChordMeta.textContent = selectedBass === null
        ? 'Showing available voicings.'
        : `Showing voicings with bass note ${NOTE_NAMES[selectedBass]}.`;

      modeLabel.textContent = selectedBass === null ? 'Chord' : 'Slash';

      const shapes = getShapesFor(selectedRoot, selectedQuality, selectedBass);

      if (!shapes.length){
        resultBody.innerHTML = `
          <div class="empty">
            <div>
              <div class="orb"></div>
              <h3>No result</h3>
              <p>Try another bass note or chord type.</p>
            </div>
          </div>
        `;
        return;
      }

      resultBody.innerHTML = `
        <h3 class="group-title">Voicings</h3>
        <div class="diagram-grid">
          ${shapes.map(shape => {
            const info = parseShapeInfo(shape, selectedBass);
            return `
              <article class="diagram-card">
                <div class="diagram-header">
                  <div>
                    <div class="diagram-title">${shape.label}</div>
                    <div class="diagram-sub">Bass: ${info.bass}</div>
                  </div>
                  <div class="fret-pill">${info.fretText}</div>
                </div>

                <div class="diagram-svg-wrap">
                  ${renderDiagramSVG(shape)}
                </div>

                <div class="voicing-meta">
                  <span class="meta-pill">${info.tones}</span>
                </div>
              </article>
            `;
          }).join('')}
        </div>
      `;
    }

    function setRoot(pc){
      selectedRoot = pc;
      [...rootGrid.children].forEach((c, i) => {
        const on = i === pc;
        c.classList.toggle('selected', on);
        c.setAttribute('aria-pressed', on ? 'true' : 'false');
      });
      renderResults();
    }

    function setQuality(key){
      selectedQuality = key;
      [...qualityGrid.children].forEach((c, i) => {
        const on = QUALITIES[i].key === key;
        c.classList.toggle('selected', on);
        c.setAttribute('aria-pressed', on ? 'true' : 'false');
      });
      renderResults();
    }

    function setBass(pcOrNull){
      selectedBass = pcOrNull;
      [...bassGrid.children].forEach(btn => {
        const val = btn.dataset.bass;
        const on =
          (pcOrNull === null && val === 'none') ||
          (pcOrNull !== null && val === String(pcOrNull));
        btn.classList.toggle('selected', on);
      });
      renderResults();
    }

    function createRootButtons(){
      NOTE_NAMES.forEach((n, pc) => {
        const btn = document.createElement('button');
        btn.className = 'note-btn';
        btn.textContent = n;
        btn.setAttribute('aria-pressed', 'false');
        btn.addEventListener('click', () => setRoot(pc));
        rootGrid.appendChild(btn);
      });
    }

    function createQualityButtons(){
      QUALITIES.forEach((q) => {
        const btn = document.createElement('button');
        btn.className = 'chip';
        btn.textContent = q.label;
        btn.setAttribute('aria-pressed', 'false');
        btn.addEventListener('click', () => setQuality(q.key));
        qualityGrid.appendChild(btn);
      });
    }

    function createBassButtons(){
      const noneBtn = document.createElement('button');
      noneBtn.className = 'mini-chip selected';
      noneBtn.textContent = 'None';
      noneBtn.dataset.bass = 'none';
      noneBtn.addEventListener('click', () => setBass(null));
      bassGrid.appendChild(noneBtn);

      NOTE_NAMES.forEach((n, pc) => {
        const btn = document.createElement('button');
        btn.className = 'mini-chip';
        btn.textContent = n;
        btn.dataset.bass = String(pc);
        btn.addEventListener('click', () => setBass(pc));
        bassGrid.appendChild(btn);
      });
    }

    function resetAll(){
      selectedRoot = null;
      selectedQuality = null;
      selectedBass = null;

      [...rootGrid.children].forEach(c => {
        c.classList.remove('selected');
        c.setAttribute('aria-pressed', 'false');
      });

      [...qualityGrid.children].forEach(c => {
        c.classList.remove('selected');
        c.setAttribute('aria-pressed', 'false');
      });

      [...bassGrid.children].forEach(btn => {
        btn.classList.toggle('selected', btn.dataset.bass === 'none');
      });

      renderResults();
      window.scrollTo({ top:0, behavior:'smooth' });
    }

    createRootButtons();
    createQualityButtons();
    createBassButtons();

    document.getElementById('resetBtn').addEventListener('click', resetAll);

    renderResults();
  </script>
</body>
</html>
