<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Chord Atlas</title>
  <style>
    :root{
      --panel:rgba(18,27,41,.84);
      --panel-strong:rgba(14,21,33,.96);
      --line:rgba(255,255,255,.09);
      --line-strong:rgba(255,255,255,.15);
      --text:#ecf3ff;
      --muted:#aab9d0;
      --muted2:#8c9eb8;
      --accent:#67d4ff;
      --accent3:#4ef1c0;
      --warning:#ffbd66;
      --shadow:0 16px 42px rgba(0,0,0,.30);
      --shadow-soft:0 10px 24px rgba(0,0,0,.20);
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;height:100%}
    body{
      min-height:100vh;
      color:var(--text);
      font-family:Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(124,140,255,.18), transparent 28%),
        radial-gradient(circle at top right, rgba(103,212,255,.14), transparent 24%),
        linear-gradient(180deg, #091018 0%, #0b1017 32%, #0d1320 100%);
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
      overflow:hidden;
    }
    .noise{position:fixed;inset:0;pointer-events:none;opacity:.05;background-image:radial-gradient(rgba(255,255,255,.5) .5px, transparent .7px);background-size:10px 10px;mix-blend-mode:soft-light}
    .app{position:relative;height:100dvh;width:100%;padding:8px}
    .main-panel{position:relative;height:100%;background:var(--panel);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column;min-width:0}

    .topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:12px 14px 10px;border-bottom:1px solid var(--line);background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));flex:0 0 auto}
    .title-wrap{min-width:0}
    .title{margin:0;font-size:clamp(22px,4vw,36px);line-height:1.05;letter-spacing:-.03em;font-weight:800}
    .title .slash{color:var(--warning)}
    .subtitle{color:var(--muted);font-size:14px;margin-top:6px;line-height:1.5}
    .top-actions{display:flex;align-items:center;gap:10px;flex:0 0 auto}
    .badge{display:inline-flex;align-items:center;gap:8px;padding:8px 11px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--muted);font-size:12px;font-weight:800;white-space:nowrap}
    .badge strong{color:var(--text);font-size:13px}

    .toolbar-btn,.note-btn,.chip,.mini-chip,.action-btn,.sheet-close{appearance:none;-webkit-appearance:none;border:none;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;transition:transform .12s ease,border-color .12s ease,background .12s ease,color .12s ease,box-shadow .12s ease}
    .toolbar-btn:active,.note-btn:active,.chip:active,.mini-chip:active,.action-btn:active,.sheet-close:active{transform:scale(.98)}
    .toolbar-btn{min-height:40px;padding:8px 16px;border-radius:11px;font-size:14px;font-weight:800}
    .toolbar-primary{color:#051018;background:linear-gradient(135deg,var(--accent3),var(--accent));box-shadow:0 10px 18px rgba(78,241,192,.14)}
    .toolbar-secondary{color:var(--muted);border:1px solid var(--line);background:rgba(255,255,255,.03)}

    .result-body{padding:12px;flex:1 1 auto;min-height:0;overflow:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
    .group-title{margin:0 0 12px;color:var(--muted);font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase}
    .diagram-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;align-items:stretch}
    .diagram-card{background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.018));border:1px solid var(--line);border-radius:16px;padding:12px;box-shadow:var(--shadow-soft);display:flex;flex-direction:column;min-width:0;min-height:300px}
    .diagram-header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px}
    .diagram-title{font-size:14px;font-weight:800;color:var(--text);line-height:1.2}
    .diagram-sub{font-size:12px;color:var(--muted2);margin-top:4px;line-height:1.35}
    .fret-pill{flex:0 0 auto;padding:6px 9px;border-radius:999px;background:rgba(255,255,255,.04);border:1px solid var(--line);color:var(--muted);font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
    .diagram-svg-wrap{width:100%;min-height:156px;display:flex;align-items:center;justify-content:center;margin-top:4px}
    .diagram-svg-wrap svg{display:block;width:100%;max-width:150px;height:auto;overflow:visible;flex:0 0 auto}
    .voicing-meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:auto;padding-top:8px}
    .meta-pill{padding:6px 9px;border-radius:999px;background:rgba(255,255,255,.035);border:1px solid var(--line);color:var(--muted);font-size:12px;font-weight:700;max-width:100%;overflow-wrap:anywhere}

    .empty{display:grid;place-items:center;min-height:260px;text-align:center;padding:20px}
    .empty .orb{width:46px;height:46px;border-radius:999px;background:radial-gradient(circle at 30% 30%, rgba(255,255,255,.35), transparent 30%),linear-gradient(135deg, rgba(103,212,255,.35), rgba(124,140,255,.28), rgba(78,241,192,.20));box-shadow:0 0 50px rgba(103,212,255,.18);margin:0 auto 12px}
    .empty h3{margin:0 0 8px;font-size:22px;letter-spacing:-.02em}
    .empty p{max-width:520px;margin:0 auto;color:var(--muted);line-height:1.6;font-size:14px}

    .overlay{position:fixed;inset:0;background:rgba(2,7,15,.58);opacity:0;pointer-events:none;transition:opacity .18s ease;z-index:20}
    .overlay.open{opacity:1;pointer-events:auto}
    .picker-sheet{position:fixed;left:50%;transform:translateX(-50%) translateY(110%);bottom:8px;width:min(92vw,440px);max-height:78dvh;background:var(--panel-strong);border:1px solid var(--line);border-radius:22px;box-shadow:0 24px 50px rgba(0,0,0,.38);overflow:hidden;display:flex;flex-direction:column;z-index:30;transition:transform .22s ease}
    .picker-sheet.open{transform:translateX(-50%) translateY(0)}
    .desktop-selector{display:block;position:fixed;top:8px;right:8px;bottom:8px;width:min(360px,31vw);background:var(--panel-strong);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);overflow:hidden;z-index:25}
    .desktop-selector .controls-scroll{height:calc(100% - 53px)}
    .desktop-selector .sheet-close{display:none}
    body.desktop-open .app{padding-right:min(376px, calc(31vw + 16px))}
    body.desktop-open .overlay{display:none}

    .sheet-head{padding:12px 14px 10px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:8px;flex:0 0 auto;background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01))}
    .sheet-title{font-size:15px;font-weight:800;letter-spacing:.03em}
    .sheet-close{width:34px;height:34px;border-radius:999px;background:rgba(255,255,255,.04);border:1px solid var(--line);color:var(--muted);font-size:18px;line-height:1}
    .controls-scroll{padding:14px;overflow:auto;min-height:0;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
    .section{margin-bottom:14px}.section:last-child{margin-bottom:0}
    .section-label{display:flex;align-items:center;gap:8px;margin:0 0 10px;color:var(--muted);font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
    .section-label::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,var(--line-strong),transparent)}
    .note-grid,.slash-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .quality-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
    .note-btn{min-height:42px;border-radius:11px;border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.02));color:var(--text);font-weight:700;font-size:15px;box-shadow:inset 0 1px 0 rgba(255,255,255,.05)}
    .note-btn.selected{background:linear-gradient(135deg,rgba(103,212,255,.25),rgba(124,140,255,.22));border-color:rgba(103,212,255,.55);box-shadow:0 0 0 1px rgba(103,212,255,.25) inset,0 8px 20px rgba(103,212,255,.12);color:#fff}
    .chip{min-height:42px;padding:8px 10px;border-radius:11px;border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.02));color:var(--text);font-size:13px;font-weight:700;text-align:center;line-height:1.2}
    .chip.selected{border-color:rgba(78,241,192,.48);background:linear-gradient(135deg,rgba(78,241,192,.18),rgba(103,212,255,.12));box-shadow:0 8px 20px rgba(78,241,192,.08)}
    .mini-chip{min-height:38px;padding:6px 6px;border-radius:10px;border:1px solid var(--line);background:rgba(255,255,255,.03);color:var(--muted);font-size:12px;font-weight:800}
    .mini-chip.selected{background:linear-gradient(135deg,rgba(255,189,102,.18),rgba(124,140,255,.16));border-color:rgba(255,189,102,.45);color:#fff}
    .action-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
    .action-btn{min-height:34px;padding:6px 12px;border-radius:10px;font-size:12px;font-weight:800}
    .action-secondary{color:var(--muted);border:1px solid var(--line);background:rgba(255,255,255,.03)}
    .fab{position:fixed;right:14px;bottom:14px;z-index:15;display:none}

    @media (max-width: 900px){ .diagram-grid{grid-template-columns:repeat(2,minmax(0,1fr))} }
    @media (max-width: 640px){
      .app{padding:8px}
      .topbar{padding:10px 10px 8px}
      .title{font-size:22px}
      .subtitle{font-size:13px;margin-top:5px}
      .badge{font-size:11px;padding:6px 8px}
      .toolbar-btn{min-height:44px;padding:8px 16px;font-size:14px}
      .toolbar-secondary.inline-reset{display:none}
      .result-body{padding:8px}
      .diagram-grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
      .diagram-card{min-height:188px;padding:8px;border-radius:14px}
      .diagram-title{font-size:12px}
      .diagram-sub{font-size:11px}
      .fret-pill{font-size:11px;padding:4px 7px}
      .diagram-svg-wrap{min-height:102px}
      .diagram-svg-wrap svg{max-width:108px}
      .meta-pill{font-size:11px;padding:4px 6px}
      .picker-sheet{left:8px;right:8px;width:auto;max-height:72dvh;bottom:8px;transform:translateY(110%);border-radius:20px}
      .picker-sheet.open{transform:translateY(0)}
      .sheet-head{padding:10px 10px 8px}
      .controls-scroll{padding:10px}
      .section{margin-bottom:10px}
      .section-label{font-size:11px;margin-bottom:7px}
      .note-grid,.slash-row,.quality-grid{gap:6px}
      .note-btn{min-height:38px;font-size:14px}
      .chip{min-height:38px;font-size:12px;padding:7px 8px}
      .mini-chip{min-height:34px;font-size:11px;padding:5px 4px}
      .action-btn{min-height:32px;padding:4px 10px;font-size:12px}
      .fab{display:block}
      .desktop-selector{display:none !important}
    }
  </style>
</head>
<body>
  <div class="noise"></div>
  <div class="app">
    <section class="main-panel">
      <div class="topbar">
        <div class="title-wrap">
          <h1 class="title" id="currentChordLabel">Select a chord</h1>
          <div class="subtitle" id="currentChordMeta">Choose root, type, and optional bass note.</div>
        </div>
        <div class="top-actions">
          <div class="badge">Mode <strong id="modeLabel">Chord</strong></div>
          <button class="toolbar-btn toolbar-primary" id="openPickerBtn" type="button">Select</button>
          <button class="toolbar-btn toolbar-secondary inline-reset" id="resetBtnTop" type="button">Reset</button>
        </div>
      </div>
      <div class="result-body" id="resultBody">
        <div class="empty"><div><div class="orb"></div><h3>Ready</h3><p>Open the selector and choose a root and chord type.</p></div></div>
      </div>
    </section>
    <button class="toolbar-btn toolbar-primary fab" id="fabOpenBtn" type="button">Select</button>
    <div class="overlay" id="overlay"></div>
    <aside class="picker-sheet" id="pickerSheet" aria-hidden="true"></aside>
    <aside class="desktop-selector" id="desktopSelector" aria-hidden="false"></aside>
  </div>

  <script>
    const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
    const STRING_PC = [4,9,2,7,11,4]; // E A D G B e

    const QUALITIES = [
      {key:'maj',  suffix:'',     label:'Major', intervals:[0,4,7]},
      {key:'min',  suffix:'m',    label:'Minor', intervals:[0,3,7]},
      {key:'7',    suffix:'7',    label:'7',     intervals:[0,4,7,10]},
      {key:'m7',   suffix:'m7',   label:'m7',    intervals:[0,3,7,10]},
      {key:'maj7', suffix:'maj7', label:'maj7',  intervals:[0,4,7,11]},
      {key:'6',    suffix:'6',    label:'6',     intervals:[0,4,7,9]},
      {key:'m6',   suffix:'m6',   label:'m6',    intervals:[0,3,7,9]},
      {key:'dim',  suffix:'dim',  label:'dim',   intervals:[0,3,6]},
      {key:'dim7', suffix:'dim7', label:'dim7',  intervals:[0,3,6,9]},
      {key:'m7b5', suffix:'m7♭5', label:'m7♭5',  intervals:[0,3,6,10]},
      {key:'aug',  suffix:'aug',  label:'aug',   intervals:[0,4,8]},
      {key:'sus4', suffix:'sus4', label:'sus4',  intervals:[0,5,7]},
      {key:'sus2', suffix:'sus2', label:'sus2',  intervals:[0,2,7]},
    ];
    const QUALITY_BY_KEY = Object.fromEntries(QUALITIES.map(q => [q.key, q]));

    // 明示フォーム辞書（オープン + 分数 + 一部定番）
    const EXPLICIT_FORMS = {
      'C_maj': [
        {label:'Open', frets:[null,3,2,0,1,0]},
        {label:'C shape / 12fr', frets:[8,10,10,9,8,8]},
        {label:'A shape / 3fr', frets:[null,3,5,5,5,3]}
      ],
      'D_maj': [
        {label:'Open', frets:[null,null,0,2,3,2]},
        {label:'A shape / 5fr', frets:[null,5,7,7,7,5]},
        {label:'E shape / 10fr', frets:[10,12,12,11,10,10]}
      ],
      'E_maj': [
        {label:'Open', frets:[0,2,2,1,0,0]},
        {label:'A shape / 7fr', frets:[null,7,9,9,9,7]},
        {label:'C shape / 4fr', frets:[null,7,6,4,5,4]}
      ],
      'G_maj': [
        {label:'Open', frets:[3,2,0,0,0,3]},
        {label:'E shape / 3fr', frets:[3,5,5,4,3,3]},
        {label:'D shape / 7fr', frets:[null,null,5,7,8,7]}
      ],
      'A_maj': [
        {label:'Open', frets:[null,0,2,2,2,0]},
        {label:'E shape / 5fr', frets:[5,7,7,6,5,5]},
        {label:'D shape / 9fr', frets:[null,null,7,9,10,9]}
      ],
      'A_min': [
        {label:'Open', frets:[null,0,2,2,1,0]},
        {label:'E shape / 5fr', frets:[5,7,7,5,5,5]},
        {label:'Am shape / 12fr', frets:[null,12,14,14,13,12]}
      ],
      'D_min': [
        {label:'Open', frets:[null,null,0,2,3,1]},
        {label:'A shape / 5fr', frets:[null,5,7,7,6,5]},
        {label:'E shape / 10fr', frets:[10,12,12,10,10,10]}
      ],
      'E_min': [
        {label:'Open', frets:[0,2,2,0,0,0]},
        {label:'Am shape / 7fr', frets:[null,7,9,9,8,7]},
        {label:'Em shape / 12fr', frets:[12,14,14,12,12,12]}
      ],
      'A_7': [
        {label:'Open', frets:[null,0,2,0,2,0]},
        {label:'E7 shape / 5fr', frets:[5,7,5,6,5,5]},
        {label:'A7 barre / 12fr', frets:[null,12,14,12,14,12]}
      ],
      'C_7': [
        {label:'Open', frets:[null,3,2,3,1,0]},
        {label:'A7 shape / 3fr', frets:[null,3,5,3,5,3]},
        {label:'E7 shape / 8fr', frets:[8,10,8,9,8,8]}
      ],
      'D_7': [
        {label:'Open', frets:[null,null,0,2,1,2]},
        {label:'A7 shape / 5fr', frets:[null,5,7,5,7,5]},
        {label:'E7 shape / 10fr', frets:[10,12,10,11,10,10]}
      ],
      'E_7': [
        {label:'Open', frets:[0,2,0,1,0,0]},
        {label:'A7 shape / 7fr', frets:[null,7,9,7,9,7]},
        {label:'E7 shape / 12fr', frets:[12,14,12,13,12,12]}
      ],
      'G_7': [
        {label:'Open', frets:[3,2,0,0,0,1]},
        {label:'E7 shape / 3fr', frets:[3,5,3,4,3,3]},
        {label:'D7 shape / 7fr', frets:[null,null,5,7,6,7]}
      ],
      'A_m7': [
        {label:'Open', frets:[null,0,2,0,1,0]},
        {label:'Em7 shape / 5fr', frets:[5,7,5,5,5,5]},
        {label:'Am7 shape / 12fr', frets:[null,12,14,12,13,12]}
      ],
      'D_m7': [
        {label:'Open', frets:[null,null,0,2,1,1]},
        {label:'Am7 shape / 5fr', frets:[null,5,7,5,6,5]},
        {label:'Em7 shape / 10fr', frets:[10,12,10,10,10,10]}
      ],
      'E_m7': [
        {label:'Open', frets:[0,2,0,0,0,0]},
        {label:'Am7 shape / 7fr', frets:[null,7,9,7,8,7]},
        {label:'Em7 shape / 12fr', frets:[12,14,12,12,12,12]}
      ],
      'C_maj7': [
        {label:'Open', frets:[null,3,2,0,0,0]},
        {label:'Amaj7 shape / 3fr', frets:[null,3,5,4,5,3]},
        {label:'Emaj7 shape / 8fr', frets:[8,10,9,9,8,8]}
      ],
      'D_maj7': [
        {label:'Open', frets:[null,null,0,2,2,2]},
        {label:'Amaj7 shape / 5fr', frets:[null,5,7,6,7,5]},
        {label:'Emaj7 shape / 10fr', frets:[10,12,11,11,10,10]}
      ],
      'E_maj7': [
        {label:'Open', frets:[0,2,1,1,0,0]},
        {label:'Amaj7 shape / 7fr', frets:[null,7,9,8,9,7]},
        {label:'Emaj7 shape / 12fr', frets:[12,14,13,13,12,12]}
      ],
      'G_maj7': [
        {label:'Open', frets:[3,2,0,0,0,2]},
        {label:'Emaj7 shape / 3fr', frets:[3,5,4,4,3,3]},
        {label:'Dmaj7 shape / 7fr', frets:[null,null,5,7,7,7]}
      ],
      'A_maj7': [
        {label:'Open', frets:[null,0,2,1,2,0]},
        {label:'Emaj7 shape / 5fr', frets:[5,7,6,6,5,5]},
        {label:'Dmaj7 shape / 9fr', frets:[null,null,7,9,9,9]}
      ]
    };

    // 汎用の定番テンプレート（オープン以外のフォーム追加）
    const MOVABLE_TEMPLATES = [
      {quality:'maj',  label:'E shape', frets:[0,2,2,1,0,0], rootString:0, rootFret:0},
      {quality:'maj',  label:'A shape', frets:[null,0,2,2,2,0], rootString:1, rootFret:0},
      {quality:'maj',  label:'C shape', frets:[null,3,2,0,1,0], rootString:1, rootFret:3},
      {quality:'maj',  label:'G shape', frets:[3,2,0,0,0,3], rootString:0, rootFret:3},
      {quality:'maj',  label:'D shape', frets:[null,null,0,2,3,2], rootString:2, rootFret:0},

      {quality:'min',  label:'Em shape', frets:[0,2,2,0,0,0], rootString:0, rootFret:0},
      {quality:'min',  label:'Am shape', frets:[null,0,2,2,1,0], rootString:1, rootFret:0},
      {quality:'min',  label:'Dm shape', frets:[null,null,0,2,3,1], rootString:2, rootFret:0},
      {quality:'min',  label:'Cm shape', frets:[null,3,5,5,4,3], rootString:1, rootFret:3},

      {quality:'7',    label:'E7 shape', frets:[0,2,0,1,0,0], rootString:0, rootFret:0},
      {quality:'7',    label:'A7 shape', frets:[null,0,2,0,2,0], rootString:1, rootFret:0},
      {quality:'7',    label:'D7 shape', frets:[null,null,0,2,1,2], rootString:2, rootFret:0},
      {quality:'7',    label:'C7 shape', frets:[null,3,2,3,1,0], rootString:1, rootFret:3},

      {quality:'m7',   label:'Em7 shape', frets:[0,2,0,0,0,0], rootString:0, rootFret:0},
      {quality:'m7',   label:'Am7 shape', frets:[null,0,2,0,1,0], rootString:1, rootFret:0},
      {quality:'m7',   label:'Dm7 shape', frets:[null,null,0,2,1,1], rootString:2, rootFret:0},
      {quality:'m7',   label:'Cm7 shape', frets:[null,3,5,3,4,3], rootString:1, rootFret:3},

      {quality:'maj7', label:'Emaj7 shape', frets:[0,2,1,1,0,0], rootString:0, rootFret:0},
      {quality:'maj7', label:'Amaj7 shape', frets:[null,0,2,1,2,0], rootString:1, rootFret:0},
      {quality:'maj7', label:'Dmaj7 shape', frets:[null,null,0,2,2,2], rootString:2, rootFret:0},
      {quality:'maj7', label:'Cmaj7 shape', frets:[null,3,2,0,0,0], rootString:1, rootFret:3},

      {quality:'sus4', label:'Esus4 shape', frets:[0,2,2,2,0,0], rootString:0, rootFret:0},
      {quality:'sus4', label:'Asus4 shape', frets:[null,0,2,2,3,0], rootString:1, rootFret:0},
      {quality:'sus4', label:'Dsus4 shape', frets:[null,null,0,2,3,3], rootString:2, rootFret:0},

      {quality:'sus2', label:'Asus2 shape', frets:[null,0,2,2,0,0], rootString:1, rootFret:0},
      {quality:'sus2', label:'Dsus2 shape', frets:[null,null,0,2,3,0], rootString:2, rootFret:0},

      {quality:'6',    label:'A6 shape', frets:[null,0,2,2,2,2], rootString:1, rootFret:0},
      {quality:'6',    label:'E6 shape', frets:[0,2,2,1,2,0], rootString:0, rootFret:0},
      {quality:'m6',   label:'Am6 shape', frets:[null,0,2,2,1,2], rootString:1, rootFret:0},
      {quality:'aug',  label:'Eaug shape', frets:[0,3,2,1,1,0], rootString:0, rootFret:0},
      {quality:'dim',  label:'Bdim shape', frets:[null,2,3,1,3,1], rootString:1, rootFret:2},
      {quality:'dim7', label:'Cdim7 shape', frets:[null,3,4,2,4,2], rootString:1, rootFret:3},
      {quality:'m7b5', label:'Bm7b5 shape', frets:[null,2,3,2,3,2], rootString:1, rootFret:2}
    ];

    // 強化した分数コード辞書
    const SLASH_FORMS = {
      'C_maj_E': [
        {label:'Open slash', frets:[0,3,2,0,1,0]},
        {label:'Compact / 8fr', frets:[null,7,10,9,8,8]}
      ],
      'C_maj_G': [
        {label:'Open slash', frets:[3,3,2,0,1,0]},
        {label:'Barre / 3fr', frets:[3,3,5,5,5,3]}
      ],
      'D_maj_F#': [
        {label:'Open slash', frets:[2,null,0,2,3,2]},
        {label:'Barre / 2fr', frets:[2,5,4,2,3,2]}
      ],
      'D_maj_A': [
        {label:'Low A bass', frets:[5,5,4,2,3,2]},
        {label:'Open inversion', frets:[null,0,0,2,3,2]}
      ],
      'E_maj_G#': [
        {label:'Open slash', frets:[4,2,2,1,0,0]},
        {label:'Barre / 4fr', frets:[4,7,6,4,5,4]}
      ],
      'E_maj_B': [
        {label:'Power bass', frets:[7,7,6,4,5,4]},
        {label:'Open B bass', frets:[null,2,2,1,0,0]}
      ],
      'G_maj_B': [
        {label:'Open slash', frets:[null,2,0,0,0,3]},
        {label:'Barre / 7fr', frets:[7,10,9,7,8,7]}
      ],
      'G_maj_D': [
        {label:'Open slash', frets:[null,5,5,4,3,3]},
        {label:'D bass / 10fr', frets:[10,10,12,12,12,10]}
      ],
      'A_maj_C#': [
        {label:'Slash / C# bass', frets:[null,4,2,2,2,0]},
        {label:'Barre / 4fr', frets:[4,7,6,6,5,4]}
      ],
      'A_maj_E': [
        {label:'Open inversion', frets:[0,0,2,2,2,0]},
        {label:'Barre / 7fr', frets:[7,7,9,9,10,9]}
      ],
      'A_min_C': [
        {label:'Open slash', frets:[null,3,2,2,1,0]},
        {label:'Barre / 3fr', frets:[null,3,5,5,4,5]}
      ],
      'A_min_E': [
        {label:'Open inversion', frets:[0,0,2,2,1,0]},
        {label:'Barre / 7fr', frets:[7,7,9,9,8,7]}
      ],
      'D_min_F': [
        {label:'Open slash', frets:[1,null,0,2,3,1]},
        {label:'Barre / 1fr', frets:[1,5,3,2,1,1]}
      ],
      'D_min_A': [
        {label:'A bass / 5fr', frets:[5,5,7,7,6,5]},
        {label:'Open inversion', frets:[null,0,0,2,3,1]}
      ],
      'E_min_G': [
        {label:'Open slash', frets:[3,2,2,0,0,0]},
        {label:'Barre / 3fr', frets:[3,5,5,3,3,3]}
      ],
      'E_min_B': [
        {label:'Open inversion', frets:[7,2,2,0,0,0]},
        {label:'Barre / 7fr', frets:[7,7,9,7,8,7]}
      ],
      'F_maj_A': [
        {label:'Slash / A bass', frets:[5,null,3,2,1,1]},
        {label:'Triad bass', frets:[null,0,3,2,1,1]}
      ],
      'F_maj_C': [
        {label:'Open slash', frets:[null,3,3,2,1,1]},
        {label:'Barre / 8fr', frets:[8,8,10,10,10,8]}
      ],
      'G_7_B': [
        {label:'Open slash', frets:[null,2,0,0,0,1]},
        {label:'Barre / 7fr', frets:[7,10,7,8,7,7]}
      ],
      'C_maj7_E': [
        {label:'Open slash', frets:[0,3,2,0,0,0]},
        {label:'Barre / 7fr', frets:[7,10,9,9,8,7]}
      ],
      'G_maj7_B': [
        {label:'Open slash', frets:[null,2,0,0,0,2]},
        {label:'Barre / 3fr', frets:[3,5,4,4,3,2]}
      ]
    };

    function normalizeFrets(frets){ return frets.map(v => v === undefined ? null : v); }
    function getPitchClassOnString(stringIdx, fret){ return (STRING_PC[stringIdx] + fret) % 12; }
    function getLowestSoundingPC(shape){
      for(let i=0;i<shape.frets.length;i++){
        const f = shape.frets[i];
        if(f !== null) return getPitchClassOnString(i, f);
      }
      return null;
    }
    function getPitchClassesInShape(shape){
      const pcs = [];
      shape.frets.forEach((f,i)=>{ if(f !== null) pcs.push(getPitchClassOnString(i,f)); });
      return pcs;
    }
    function uniqueKeyFromFrets(frets){ return frets.map(v => v === null ? 'x' : String(v)).join('-'); }
    function chordKey(rootPC, qualityKey){ return `${NOTE_NAMES[rootPC]}_${qualityKey}`; }

    function transposeTemplate(template, rootPC){
      const basePC = getPitchClassOnString(template.rootString, template.rootFret);
      const shift = ((rootPC - basePC) % 12 + 12) % 12;
      const frets = template.frets.map(f => f === null ? null : f + shift);
      if(frets.some(f => f !== null && f > 15)) return null;
      return {
        label: `${template.label} / ${shift}fr`,
        frets,
        baseFret: Math.min(...frets.filter(v => v !== null && v > 0), 0),
        kind: 'template'
      };
    }

    function compactWindowVoicings(rootPC, qualityKey, bassPC=null){
      const q = QUALITY_BY_KEY[qualityKey];
      const tones = new Set(q.intervals.map(iv => (rootPC + iv) % 12));
      const windows = [0,2,4,5,7,9,10];
      const stringSets = [[2,3,4,5],[1,2,3,4],[0,1,2,3]];
      const out = [];
      const seen = new Set();
      for(const start of windows){
        const end = start + 4;
        for(const strings of stringSets){
          const frets = new Array(6).fill(null);
          const got = new Set();
          for(const s of strings){
            let chosen = null;
            for(let f=start; f<=end; f++){
              const pc = getPitchClassOnString(s, f);
              if(tones.has(pc)){ chosen = f; break; }
            }
            if(chosen !== null){
              frets[s] = chosen;
              got.add(getPitchClassOnString(s, chosen));
            }
          }
          if(got.size < 3) continue;
          const shape = {label:`Compact / ${start}fr`, frets, kind:'compact', baseFret:start};
          const low = getLowestSoundingPC(shape);
          if(bassPC !== null && low !== bassPC) continue;
          const key = uniqueKeyFromFrets(frets);
          if(!seen.has(key)){
            seen.add(key);
            out.push(shape);
          }
        }
      }
      return out.slice(0,4);
    }

    function getFormsFromExplicit(rootPC, qualityKey){
      const key = chordKey(rootPC, qualityKey);
      return (EXPLICIT_FORMS[key] || []).map(item => ({
        label: item.label,
        frets: normalizeFrets(item.frets),
        kind: 'explicit',
        baseFret: Math.min(...item.frets.filter(v => v !== null && v > 0), 0)
      }));
    }

    function getFormsFromSlashDictionary(rootPC, qualityKey, bassPC){
      if(bassPC === null) return [];
      const key = `${NOTE_NAMES[rootPC]}_${qualityKey === 'maj' ? 'maj' : qualityKey}_${NOTE_NAMES[bassPC]}`;
      return (SLASH_FORMS[key] || []).map(item => ({
        label: item.label,
        frets: normalizeFrets(item.frets),
        kind: 'slash-explicit',
        baseFret: Math.min(...item.frets.filter(v => v !== null && v > 0), 0)
      }));
    }

    function getTemplateForms(rootPC, qualityKey){
      return MOVABLE_TEMPLATES
        .filter(t => t.quality === qualityKey)
        .map(t => transposeTemplate(t, rootPC))
        .filter(Boolean);
    }

    function getShapesFor(rootPC, qualityKey, bassPC=null){
      const forms = [];
      forms.push(...getFormsFromExplicit(rootPC, qualityKey));
      forms.push(...getFormsFromSlashDictionary(rootPC, qualityKey, bassPC));
      forms.push(...getTemplateForms(rootPC, qualityKey));
      forms.push(...compactWindowVoicings(rootPC, qualityKey, bassPC));

      const deduped = [];
      const seen = new Set();
      for(const form of forms){
        const low = getLowestSoundingPC(form);
        if(bassPC !== null && low !== bassPC) continue;
        const key = uniqueKeyFromFrets(form.frets);
        if(!seen.has(key)){
          seen.add(key);
          deduped.push(form);
        }
      }
      deduped.sort((a,b) => {
        const aa = a.baseFret || 0;
        const bb = b.baseFret || 0;
        if(aa !== bb) return aa - bb;
        return a.frets.filter(v => v === null).length - b.frets.filter(v => v === null).length;
      });
      return deduped.slice(0, 12);
    }

    function renderDiagramSVG(shape){
      const W = 156, H = 196;
      const left = 24, right = W - 18, top = 36, bottom = H - 18;
      const nStrings = 6, nFrets = 5;
      const stepX = (right - left) / (nStrings - 1);
      const stepY = (bottom - top) / nFrets;
      const positiveFrets = shape.frets.filter(v => v !== null && v > 0);
      const minF = positiveFrets.length ? Math.min(...positiveFrets) : 0;
      const baseFret = minF > 1 ? minF : 0;
      const showNut = baseFret === 0;
      const gradId1 = 'boardGrad_' + Math.random().toString(36).slice(2,10);
      const gradId2 = 'markGrad_' + Math.random().toString(36).slice(2,10);
      let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">`;
      svg += `<defs><linearGradient id="${gradId1}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#131d2d"/><stop offset="100%" stop-color="#0b1017"/></linearGradient><linearGradient id="${gradId2}" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#7cf5ff"/><stop offset="100%" stop-color="#4ef1c0"/></linearGradient></defs>`;
      svg += `<rect x="${left-8}" y="${top-4}" width="${right-left+16}" height="${bottom-top+8}" rx="10" fill="url(#${gradId1})" stroke="rgba(255,255,255,0.08)"/>`;
      for(let i=0;i<=nFrets;i++){
        const y = top + stepY * i;
        const strokeW = (i === 0 && showNut) ? 4.5 : 1.25;
        svg += `<line x1="${left}" y1="${y}" x2="${right}" y2="${y}" stroke="rgba(236,243,255,0.92)" stroke-width="${strokeW}" opacity="${i===0?1:.88}"/>`;
      }
      for(let s=0;s<nStrings;s++){
        const x = left + stepX * s;
        svg += `<line x1="${x}" y1="${top}" x2="${x}" y2="${bottom}" stroke="rgba(236,243,255,0.85)" stroke-width="1.15"/>`;
      }
      if(!showNut){
        svg += `<text x="${left-10}" y="${top + stepY*0.78}" fill="#c6d5ea" font-family="Inter, sans-serif" font-weight="800" font-size="13" text-anchor="end">${baseFret}fr</text>`;
      }
      shape.frets.forEach((f,s)=>{
        const x = left + stepX*s;
        if(f === null){
          svg += `<text x="${x}" y="${top-11}" fill="#ff9aad" font-family="Inter, sans-serif" font-size="13" font-weight="800" text-anchor="middle">×</text>`;
          return;
        }
        if(showNut && f === 0){
          svg += `<circle cx="${x}" cy="${top-9}" r="4.6" fill="none" stroke="rgba(236,243,255,0.95)" stroke-width="1.8"/>`;
          return;
        }
        const row = showNut ? f : (f - baseFret + 1);
        if(row < 1 || row > nFrets) return;
        const cy = top + stepY * (row - 0.5);
        svg += `<circle cx="${x}" cy="${cy}" r="6.2" fill="url(#${gradId2})" stroke="rgba(255,255,255,0.16)" stroke-width="1.1"/>`;
      });
      svg += `</svg>`;
      return svg;
    }

    function parseShapeInfo(shape, bassPC){
      const pcs = [...new Set(getPitchClassesInShape(shape))].map(pc => NOTE_NAMES[pc]).join(' / ');
      const bassName = bassPC !== null ? NOTE_NAMES[bassPC] : NOTE_NAMES[getLowestSoundingPC(shape)];
      return {tones: pcs, bass: bassName};
    }

    let selectedRoot = null;
    let selectedQuality = null;
    let selectedBass = null;

    const resultBody = document.getElementById('resultBody');
    const currentChordLabel = document.getElementById('currentChordLabel');
    const currentChordMeta = document.getElementById('currentChordMeta');
    const modeLabel = document.getElementById('modeLabel');
    const overlay = document.getElementById('overlay');
    const pickerSheet = document.getElementById('pickerSheet');
    const desktopSelector = document.getElementById('desktopSelector');
    const openPickerBtn = document.getElementById('openPickerBtn');
    const fabOpenBtn = document.getElementById('fabOpenBtn');
    const resetBtnTop = document.getElementById('resetBtnTop');

    function selectorMarkup(prefix, includeClose){
      return `
        <div class="sheet-head">
          <div class="sheet-title">Chord Selector</div>
          ${includeClose ? '<button class="sheet-close" id="closePickerBtnInner" type="button" aria-label="Close">×</button>' : ''}
        </div>
        <div class="controls-scroll" id="controlsScroll${prefix}">
          <section class="section">
            <p class="section-label">Root</p>
            <div class="note-grid" id="rootGrid${prefix}"></div>
          </section>
          <section class="section">
            <p class="section-label">Code Type</p>
            <div class="quality-grid" id="qualityGrid${prefix}"></div>
          </section>
          <section class="section">
            <p class="section-label">Bass</p>
            <div class="slash-row" id="bassGrid${prefix}"></div>
          </section>
          <div class="action-row">
            <button class="action-btn action-secondary" id="resetBtn${prefix}" type="button">Reset</button>
          </div>
        </div>`;
    }

    pickerSheet.innerHTML = selectorMarkup('', true);
    desktopSelector.innerHTML = selectorMarkup('Desktop', false);

    const rootGrids = [document.getElementById('rootGrid'), document.getElementById('rootGridDesktop')];
    const qualityGrids = [document.getElementById('qualityGrid'), document.getElementById('qualityGridDesktop')];
    const bassGrids = [document.getElementById('bassGrid'), document.getElementById('bassGridDesktop')];
    document.getElementById('closePickerBtnInner').addEventListener('click', closePicker);
    document.getElementById('resetBtn').addEventListener('click', resetAll);
    document.getElementById('resetBtnDesktop').addEventListener('click', resetAll);

    function isMobile(){ return window.matchMedia('(max-width: 640px)').matches; }
    function openPicker(){ overlay.classList.add('open'); pickerSheet.classList.add('open'); pickerSheet.setAttribute('aria-hidden','false'); }
    function closePicker(){ overlay.classList.remove('open'); pickerSheet.classList.remove('open'); pickerSheet.setAttribute('aria-hidden','true'); }

    function renderResults(){
      if(selectedRoot === null || selectedQuality === null){
        currentChordLabel.textContent = 'Select a chord';
        currentChordMeta.textContent = 'Choose root, type, and optional bass note.';
        modeLabel.textContent = 'Chord';
        resultBody.innerHTML = `<div class="empty"><div><div class="orb"></div><h3>Ready</h3><p>Open the selector and choose a root and chord type.</p></div></div>`;
        return;
      }
      const q = QUALITY_BY_KEY[selectedQuality];
      const main = `${NOTE_NAMES[selectedRoot]}${q.suffix}`;
      currentChordLabel.innerHTML = selectedBass === null ? main : `${main}<span class="slash"> / ${NOTE_NAMES[selectedBass]}</span>`;
      currentChordMeta.textContent = selectedBass === null ? 'Showing standard, alternate, and compact voicings.' : `Showing slash voicings with bass note ${NOTE_NAMES[selectedBass]}.`;
      modeLabel.textContent = selectedBass === null ? 'Chord' : 'Slash';
      const shapes = getShapesFor(selectedRoot, selectedQuality, selectedBass);
      if(!shapes.length){
        resultBody.innerHTML = `<div class="empty"><div><div class="orb"></div><h3>No result</h3><p>Try another bass note or chord type.</p></div></div>`;
        return;
      }
      resultBody.innerHTML = `<h3 class="group-title">Voicings</h3><div class="diagram-grid">${shapes.map(shape => {
        const info = parseShapeInfo(shape, selectedBass);
        const positiveFrets = shape.frets.filter(v => v !== null && v > 0);
        const pos = positiveFrets.length ? Math.min(...positiveFrets) : 0;
        const fretText = pos > 1 ? `${pos}fr` : 'Open';
        return `<article class="diagram-card"><div class="diagram-header"><div><div class="diagram-title">${shape.label}</div><div class="diagram-sub">Bass: ${info.bass}</div></div><div class="fret-pill">${fretText}</div></div><div class="diagram-svg-wrap">${renderDiagramSVG(shape)}</div><div class="voicing-meta"><span class="meta-pill">${info.tones}</span></div></article>`;
      }).join('')}</div>`;
    }

    function setRoot(pc){
      selectedRoot = pc;
      rootGrids.forEach(grid => [...grid.children].forEach((c,i)=>{ const on = i===pc; c.classList.toggle('selected', on); c.setAttribute('aria-pressed', on ? 'true' : 'false'); }));
      renderResults();
    }
    function setQuality(key){
      selectedQuality = key;
      qualityGrids.forEach(grid => [...grid.children].forEach((c,i)=>{ const on = QUALITIES[i].key===key; c.classList.toggle('selected', on); c.setAttribute('aria-pressed', on ? 'true' : 'false'); }));
      renderResults();
    }
    function setBass(pcOrNull){
      selectedBass = pcOrNull;
      bassGrids.forEach(grid => [...grid.children].forEach(btn=>{ const val = btn.dataset.bass; const on = (pcOrNull===null && val==='none') || (pcOrNull!==null && val===String(pcOrNull)); btn.classList.toggle('selected', on); }));
      renderResults();
    }

    function createButtons(){
      NOTE_NAMES.forEach((n,pc)=>{
        rootGrids.forEach(target=>{
          const btn = document.createElement('button');
          btn.className = 'note-btn'; btn.textContent = n; btn.type = 'button'; btn.setAttribute('aria-pressed','false');
          btn.addEventListener('click', ()=>setRoot(pc));
          target.appendChild(btn);
        });
      });
      QUALITIES.forEach(q=>{
        qualityGrids.forEach(target=>{
          const btn = document.createElement('button');
          btn.className = 'chip'; btn.textContent = q.label; btn.type = 'button'; btn.setAttribute('aria-pressed','false');
          btn.addEventListener('click', ()=>setQuality(q.key));
          target.appendChild(btn);
        });
      });
      bassGrids.forEach(target=>{
        const noneBtn = document.createElement('button');
        noneBtn.className = 'mini-chip selected'; noneBtn.textContent = 'None'; noneBtn.dataset.bass = 'none'; noneBtn.type = 'button';
        noneBtn.addEventListener('click', ()=>setBass(null));
        target.appendChild(noneBtn);
        NOTE_NAMES.forEach((n,pc)=>{
          const btn = document.createElement('button');
          btn.className = 'mini-chip'; btn.textContent = n; btn.dataset.bass = String(pc); btn.type='button';
          btn.addEventListener('click', ()=>setBass(pc));
          target.appendChild(btn);
        });
      });
    }

    function resetAll(){
      selectedRoot = null; selectedQuality = null; selectedBass = null;
      rootGrids.forEach(grid=>[...grid.children].forEach(c=>{ c.classList.remove('selected'); c.setAttribute('aria-pressed','false'); }));
      qualityGrids.forEach(grid=>[...grid.children].forEach(c=>{ c.classList.remove('selected'); c.setAttribute('aria-pressed','false'); }));
      bassGrids.forEach(grid=>[...grid.children].forEach(btn=>btn.classList.toggle('selected', btn.dataset.bass==='none')));
      renderResults();
      resultBody.scrollTop = 0;
      document.getElementById('controlsScroll').scrollTop = 0;
      document.getElementById('controlsScrollDesktop').scrollTop = 0;
    }

    openPickerBtn.addEventListener('click', openPicker);
    fabOpenBtn.addEventListener('click', openPicker);
    overlay.addEventListener('click', closePicker);
    resetBtnTop.addEventListener('click', resetAll);
    document.addEventListener('keydown', e=>{ if(e.key === 'Escape') closePicker(); });

    function syncUiVisibility(){
      if(!isMobile()){
        fabOpenBtn.style.display = 'none';
        document.body.classList.add('desktop-open');
        closePicker();
      } else {
        fabOpenBtn.style.display = 'block';
        document.body.classList.remove('desktop-open');
      }
    }
    window.addEventListener('resize', syncUiVisibility);

    createButtons();
    syncUiVisibility();
    renderResults();
  </script>
</body>
</html>
